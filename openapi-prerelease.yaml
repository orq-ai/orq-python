        code:
          type: "string"
          description: "HTTP status code"
        message:
          type: "string"
          description: "Error message"
      required:
        - "message"
    ThinkingConfigDisabledSchema:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
            - "disabled"
          description: "Disables the thinking mode capability"
      required:
        - "type"
      title: "Thinking config disabled"
      description: "Disables the thinking mode capability"
    ThinkingConfigEnabledSchema:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
            - "enabled"
          description: "Enables or disables the thinking mode capability"
        budget_tokens:
          type: "number"
          description: "Determines how many tokens the model can use for its internal reasoning process. Larger budgets can enable more thorough analysis for complex problems, improving response quality. Must be ≥1024 and less than `max_tokens`."
        thinking_level:
          type: "string"
          enum:
            - "low"
            - "high"
          description: "The level of reasoning the model should use. This setting is supported only by `gemini-3` models. If budget_tokens is specified and `thinking_level` is available, `budget_tokens` will be ignored."
      required:
        - "type"
        - "budget_tokens"
      title: "Thinking config enabled"
      description: "Enables the thinking mode capability"
    ThinkingConfigAdaptiveSchema:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
            - "adaptive"
          description: "Lets the model dynamically determine when and how much to use extended thinking based on the complexity of each request. Supported on Claude Opus 4.6 and Sonnet 4.6."
      required:
        - "type"
      title: "Thinking config adaptive"
      description: "Enables adaptive thinking mode where the model dynamically determines thinking depth"
    CreateAgentResponse:
      type: "object"
      properties:
        _id:
          type: "string"
          description: "The unique response ID"
        task_id:
          type: "string"
          description: "The agent execution task ID"
        output:
          type: "array"
          items:
            $ref: "#/components/schemas/AgentResponseMessage"
          description: "Array of messages from the agent execution"
        created_at:
          type: "string"
          description: "ISO timestamp of response creation"
        model:
          type: "string"
          description: "Model used in provider/model format"
        usage:
          type:
            - "object"
            - "null"
          properties:
            completion_tokens:
              type: "number"
              description: "Number of tokens in the generated completion."
            prompt_tokens:
              type: "number"
              description: "Number of tokens in the prompt."
            total_tokens:
              type: "number"
              description: "Total number of tokens used in the request (prompt + completion)."
            prompt_tokens_details:
              type:
                - "object"
                - "null"
              properties:
                cached_tokens:
                  type:
                    - "integer"
                    - "null"
                cache_creation_tokens:
                  type:
                    - "integer"
                    - "null"
                audio_tokens:
                  type:
                    - "integer"
                    - "null"
                  description: "The number of audio input tokens consumed by the request."
            completion_tokens_details:
              type:
                - "object"
                - "null"
              properties:
                reasoning_tokens:
                  type:
                    - "number"
                    - "null"
                accepted_prediction_tokens:
                  type:
                    - "number"
                    - "null"
                rejected_prediction_tokens:
                  type:
                    - "number"
                    - "null"
                audio_tokens:
                  type:
                    - "integer"
                    - "null"
                  description: "The number of audio output tokens produced by the response."
          description: "Token usage from the agent execution"
        finish_reason:
          type: "string"
          enum:
            - "stop"
            - "length"
            - "tool_calls"
            - "content_filter"
            - "function_call"
            - "max_iterations"
            - "max_time"
