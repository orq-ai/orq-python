                      description: "Array of fallback models to use if primary model fails"
                    cache:
                      type: "object"
                      properties:
                        ttl:
                          type: "number"
                          minimum: 1
                          maximum: 259200
                          default: 1800
                          description: "Time to live for cached responses in seconds. Maximum 259200 seconds (3 days)."
                          example: 3600
                        type:
                          type: "string"
                          enum:
                            - "exact_match"
                      required:
                        - "type"
                      description: "Cache configuration for the request."
                    retry:
                      type: "object"
                      properties:
                        count:
                          type: "number"
                          minimum: 1
                          maximum: 5
                          default: 3
                          description: "Number of retry attempts (1-5)"
                          example: 3
                        on_codes:
                          type: "array"
                          items:
                            type: "number"
                            minimum: 100
                            maximum: 599
                          minItems: 1
                          default:
                            - 429
                          description: "HTTP status codes that trigger retry logic"
                          example:
                            - 429
                            - 500
                            - 502
                            - 503
                            - 504
                      description: "Retry configuration for the request"
                    identity:
                      $ref: "#/components/schemas/PublicIdentity"
                    contact:
                      $ref: "#/components/schemas/PublicContact"
                    load_balancer:
                      oneOf:
                        - type: "object"
                          properties:
                            type:
                              type: "string"
                              enum:
                                - "weight_based"
                            models:
                              type: "array"
                              items:
                                type: "object"
                                properties:
                                  model:
                                    type: "string"
                                    description: "Model identifier for load balancing"
                                    example: "openai/gpt-4o"
                                  weight:
                                    type: "number"
                                    minimum: 0.001
                                    maximum: 1
                                    default: 0.5
                                    description: "Weight assigned to this model for load balancing"
                                    example: 0.7
                                required:
                                  - "model"
                          required:
                            - "type"
                            - "models"
                      description: "Array of models with weights for load balancing requests"
                      example:
                        type: "weight_based"
                        models:
                          - model: "openai/gpt-4o"
                            weight: 0.7
                          - model: "anthropic/claude-3-5-sonnet"
                            weight: 0.3
                    timeout:
                      type: "object"
                      properties:
                        call_timeout:
                          type: "number"
                          minimum: 1
                          description: "Timeout value in milliseconds"
                          example: 30000
