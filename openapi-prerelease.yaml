              x-deprecation-notice: "This field will be replaced by previous_response_id in a future version. Track the responseId from each response to use for continuations."
            model:
              type: "string"
              description: "The model ID being used for this response in provider/model format"
            workflowRunId:
              type: "string"
              description: "Trace ID for this turn of the conversation (new for each continuation)"
            userMessageId:
              type: "string"
              description: "Server-generated ID for the user message. Use this ID for frontend state consistency."
            assistantMessageId:
              type: "string"
              description: "Server-generated ID for the assistant message. Use this ID for frontend state consistency."
            telemetry:
              $ref: "#/components/schemas/Telemetry"
          required:
            - "responseId"
            - "taskId"
            - "model"
            - "workflowRunId"
      required:
        - "type"
        - "timestamp"
        - "data"
      title: "Response Started Event"
      description: "Emitted when the agent begins processing. Contains identifiers for tracking the response."
    ResponseDoneEvent:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
            - "response.done"
        timestamp:
          type: "string"
          description: "ISO timestamp of when the event occurred"
        data:
          type: "object"
          properties:
            finishReason:
              type: "string"
              enum:
                - "stop"
                - "length"
                - "tool_calls"
                - "content_filter"
                - "function_call"
                - "max_iterations"
                - "max_time"
              description: "The reason why the agent stopped generating"
            usage:
              type: "object"
              properties:
                completion_tokens:
                  type: "number"
                  description: "Number of tokens in the generated completion."
                prompt_tokens:
                  type: "number"
                  description: "Number of tokens in the prompt."
                total_tokens:
                  type: "number"
                  description: "Total number of tokens used in the request (prompt + completion)."
                prompt_tokens_details:
                  type:
                    - "object"
                    - "null"
                  properties:
                    cached_tokens:
                      type:
                        - "integer"
                        - "null"
                    cache_creation_tokens:
                      type:
                        - "integer"
                        - "null"
                    audio_tokens:
                      type:
                        - "integer"
                        - "null"
                      description: "The number of audio input tokens consumed by the request."
                completion_tokens_details:
                  type:
                    - "object"
                    - "null"
                  properties:
                    reasoning_tokens:
                      type:
                        - "number"
                        - "null"
                    accepted_prediction_tokens:
                      type:
                        - "number"
                        - "null"
                    rejected_prediction_tokens:
                      type:
                        - "number"
                        - "null"
                    audio_tokens:
                      type:
                        - "integer"
                        - "null"
                      description: "The number of audio output tokens produced by the response."
              description: "Token usage statistics for the complete response"
            pendingToolCalls:
              type: "array"
              items:
                type: "object"
                properties:
                  id:
                    type: "string"
                    description: "Unique identifier for the tool call"
                  type:
                    type: "string"
                    enum:
                      - "function"
                  function:
                    type: "object"
                    properties:
                      name:
                        type: "string"
                        description: "The name of the function to call"
                      arguments:
                        type: "string"
                        description: "The arguments to pass to the function as JSON string"
                required:
                  - "id"
                  - "type"
                  - "function"
              description: "Tool calls awaiting user response (when finishReason is function_call)"
            telemetry:
              $ref: "#/components/schemas/Telemetry"
          required:
            - "finishReason"
      required:
        - "type"
        - "timestamp"
        - "data"
      title: "Response Done Event"
      description: "Emitted when the agent completes processing. Contains the finish reason and usage statistics."
    ResponseFailedEvent:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
            - "response.failed"
        timestamp:
          type: "string"
          description: "ISO timestamp of when the event occurred"
        data:
          type: "object"
          properties:
            error:
              type: "string"
              description: "Error message describing what went wrong"
            code:
              type: "number"
              description: "HTTP status code indicating the error type"
          required:
            - "error"
            - "code"
      required:
        - "type"
        - "timestamp"
        - "data"
      title: "Response Failed Event"
      description: "Emitted when an error occurs during agent execution. Contains error details."
    ToolStartedEvent:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
            - "tool.started"
        timestamp:
          type: "string"
          description: "ISO timestamp of when the event occurred"
        data:
          type: "object"
          properties:
            toolId:
              type: "string"
              description: "Unique identifier for the tool"
            toolName:
              type: "string"
              description: "Display name of the tool"
            toolCallId:
              type: "string"
              description: "Unique identifier for this specific tool call"
            arguments:
              type: "object"
              additionalProperties: {}
              description: "Arguments passed to the tool"
          required:
            - "toolId"
            - "toolCallId"
            - "arguments"
      required:
        - "type"
        - "timestamp"
        - "data"
      title: "Tool Started Event"
      description: "Emitted when a tool begins execution. Contains tool details and input arguments."
    ToolDoneEvent:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
            - "tool.done"
        timestamp:
          type: "string"
          description: "ISO timestamp of when the event occurred"
        data:
          type: "object"
          properties:
            toolId:
              type: "string"
              description: "Unique identifier for the tool in the tool registry"
            toolCallId:
              type: "string"
              description: "Unique identifier matching the tool call that was executed"
            result:
              description: "The result returned by the tool"
          required:
            - "toolId"
            - "toolCallId"
      required:
        - "type"
        - "timestamp"
        - "data"
      title: "Tool Done Event"
      description: "Emitted when a tool completes execution successfully. Contains the tool result."
    ToolFailedEvent:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
            - "tool.failed"
        timestamp:
          type: "string"
          description: "ISO timestamp of when the event occurred"
        data:
          type: "object"
          properties:
            toolId:
              type: "string"
              description: "Unique identifier for the tool in the tool registry"
            toolCallId:
              type: "string"
              description: "Unique identifier matching the tool call that failed"
            error:
              type: "string"
              description: "Error message describing why the tool failed"
          required:
            - "toolId"
            - "toolCallId"
            - "error"
      required:
        - "type"
        - "timestamp"
        - "data"
      title: "Tool Failed Event"
      description: "Emitted when a tool execution fails. Contains error details."
    ToolReviewRequestedEvent:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
            - "tool.review.requested"
        timestamp:
          type: "string"
          description: "ISO timestamp of when the event occurred"
        data:
          type: "object"
          properties:
            toolId:
              type: "string"
              description: "Unique identifier for the tool in the tool registry"
            toolCallId:
              type: "string"
              description: "The tool call ID requiring review"
            toolName:
              type: "string"
              description: "Name of the tool requiring approval"
            arguments:
              type: "object"
              additionalProperties: {}
              description: "Arguments that will be passed to the tool"
            requiresApproval:
              type: "boolean"
              description: "Whether approval is mandatory before execution"
          required:
            - "toolId"
            - "toolCallId"
            - "arguments"
            - "requiresApproval"
      required:
        - "type"
        - "timestamp"
        - "data"
      title: "Tool Review Requested Event"
      description: "Emitted when a tool action requires approval before execution. The execution will pause until reviewed."
    ToolReviewDoneEvent:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
            - "tool.review.done"
        timestamp:
          type: "string"
          description: "ISO timestamp of when the event occurred"
        data:
          type: "object"
          properties:
            toolId:
              type: "string"
              description: "Unique identifier for the tool in the tool registry"
            toolCallId:
              type: "string"
              description: "The tool call ID that was reviewed"
            review:
              $ref: "#/components/schemas/ReviewOutcome"
          required:
            - "toolId"
            - "toolCallId"
            - "review"
      required:
        - "type"
        - "timestamp"
        - "data"
      title: "Tool Review Done Event"
      description: "Emitted after a tool action has been reviewed. Contains the review decision."
    ReviewOutcome:
      type: "string"
      enum:
        - "approved"
        - "rejected"
      title: "Review Outcome"
      description: "The review decision"
    PartDeltaEvent:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
            - "part.delta"
        timestamp:
          type: "string"
          description: "ISO timestamp of when the event occurred"
        data:
          type: "object"
          properties:
            partId:
              type: "string"
              description: "Unique identifier for this part. Format: {kind}_{ulid}. Use to correlate with part.done event."
              example: "text_01hxyz123abc"
            delta:
              $ref: "#/components/schemas/PartDelta"
          required:
            - "partId"
            - "delta"
      required:
        - "type"
        - "timestamp"
        - "data"
      title: "Part Delta Event"
      description: "Emitted for each content chunk streamed from the LLM. The delta field contains a discriminated union based on the kind field."
    PartDelta:
      oneOf:
        - allOf:
            - $ref: "#/components/schemas/TextPart"
            - description: "A message part containing text content"
        - $ref: "#/components/schemas/ReasoningPart"
        - allOf:
            - $ref: "#/components/schemas/FilePart"
            - description: "A message part containing file content, either embedded or referenced"
        - allOf:
            - $ref: "#/components/schemas/DataPart"
            - description: "A message part containing arbitrary structured data as key-value pairs"
      discriminator:
        propertyName: "kind"
        mapping:
          text: "#/components/schemas/TextPart"
          reasoning: "#/components/schemas/ReasoningPart"
          file: "#/components/schemas/FilePart"
          data: "#/components/schemas/DataPart"
      description: "The content chunk being streamed. Discriminated by kind field (text or reasoning)."
    ReasoningPart:
      allOf:
        - $ref: "#/components/schemas/BasePart"
        - type: "object"
          properties:
            _id:
              type: "string"
              default: "reasoning_01kpsxxefk2zd7749xb9yjwnhy"
              description: "Unique identifier for the part. Format: reasoning_{ulid} (e.g., reasoning_01hxyz...)"
              example: "reasoning_01hxyz123abc"
            kind:
              type: "string"
              enum:
                - "reasoning"
              description: "Type discriminator indicating this is a reasoning part"
              example: "reasoning"
            reasoning:
              type: "string"
              description: "The reasoning or thought process behind the response. Used for chain-of-thought or extended thinking."
              example: "Let me analyze this step by step..."
            signature:
              type: "string"
              description: "Optional cryptographic signature to verify the authenticity and integrity of the reasoning content"
              example: "sha256:a1b2c3d4e5f6..."
          required:
            - "kind"
            - "reasoning"
      title: "Reasoning Part"
      description: "A message part containing reasoning or chain-of-thought content"
    BasePart:
      type: "object"
      properties:
        _id:
          type: "string"
          description: "Unique identifier for the part. Format: {kind}_{ulid} (e.g., text_01hxyz...)"
          example: "text_01hxyz123abc"
        metadata:
          type: "object"
          additionalProperties: {}
          description: "Optional metadata associated with the message part. Can store arbitrary key-value pairs for custom data. Maximum size of 50KB and maximum of 20 keys."
          example:
            source: "user_input"
            timestamp: "2024-01-15T10:30:00Z"
      required:
        - "_id"
      title: "Base Part"
      description: "Base schema for all message parts"
    PartDoneEvent:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
            - "part.done"
        timestamp:
          type: "string"
          description: "ISO timestamp of when the event occurred"
        data:
          type: "object"
          properties:
            partId:
              type: "string"
              description: "Unique identifier for this part. Matches the partId from part.delta events."
              example: "text_01hxyz123abc"
            part:
              allOf:
                - $ref: "#/components/schemas/PartDelta"
                - description: "The complete part. Discriminated by kind field (text, reasoning, file, data)."
          required:
            - "partId"
            - "part"
      required:
        - "type"
        - "timestamp"
        - "data"
      title: "Part Done Event"
      description: "Emitted when a part has been fully streamed. Contains the complete part with all content."
    GetAgentResponse:
      allOf:
        - $ref: "#/components/schemas/CreateAgentResponse"
        - type: "object"
          properties:
            status:
              type: "string"
              enum:
                - "in_progress"
                - "completed"
                - "failed"
              description: "Current status of the agent response"
            error:
              type: "string"
              description: "Error message when status is failed"
          required:
            - "status"
      title: "Get Agent Response"
      description: "Response type from the get-response endpoint. Includes a status field indicating the current state of the agent execution."
    ExtendedMessage:
      type: "object"
      properties:
        kind:
          type: "string"
          enum:
            - "message"
        messageId:
          type: "string"
          description: "Unique identifier for the message"
        role:
          type: "string"
          enum:
            - "user"
            - "agent"
            - "tool"
            - "system"
          title: "Extended Message Role"
          description: "Role of the message sender in the A2A protocol. Values: user (end user), agent (AI agent), tool (tool execution result), system (system instructions/prompts)."
        parts:
          type: "array"
          items:
            oneOf:
              - $ref: "#/components/schemas/TextPart"
              - $ref: "#/components/schemas/ErrorPart"
              - $ref: "#/components/schemas/DataPart"
              - $ref: "#/components/schemas/FilePart"
              - $ref: "#/components/schemas/ToolCallPart"
              - $ref: "#/components/schemas/ToolResultPart"
            discriminator:
              propertyName: "kind"
              mapping:
                text: "#/components/schemas/TextPart"
                error: "#/components/schemas/ErrorPart"
                data: "#/components/schemas/DataPart"
                file: "#/components/schemas/FilePart"
                tool_call: "#/components/schemas/ToolCallPart"
                tool_result: "#/components/schemas/ToolResultPart"
          description: "Array of message parts (text, file, tool_call, tool_result)"
        taskId:
          type: "string"
          description: "Associated task ID if applicable"
        contextId:
          type: "string"
          description: "Correlation ID for execution tracking"
        metadata:
          type: "object"
          additionalProperties: {}
          description: "Additional message metadata"
      required:
        - "kind"
        - "messageId"
        - "role"
        - "parts"
      title: "Extended A2A Message"
      description: "Extended Agent-to-Agent protocol message with support for tool calls and tool results. Extends the base A2A message format with Orquesta-specific features."
    AgentExecutionStartedStreamingEvent:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
            - "agents.execution_started"
        timestamp:
          type: "string"
          description: "ISO timestamp of the event"
        data:
          type: "object"
          properties:
            agent_task_id:
              type: "string"
              description: "Agent execution task ID (ULID)"
            workspace_id:
              type: "string"
              description: "Workspace ID"
            trace_id:
              type: "string"
              description: "Trace ID for the workflow run"
          required:
            - "agent_task_id"
            - "workspace_id"
            - "trace_id"
      required:
        - "type"
        - "timestamp"
        - "data"
      title: "Agent Execution Started Event"
      description: "Initial event emitted when an agent stream begins. Contains the task ID for tracking, workspace context, and trace ID for observability."
    AgentStartedStreamingEvent:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
            - "event.agents.started"
        timestamp:
          type: "string"
          description: "ISO timestamp of the event"
        data:
          type: "object"
          properties:
            workflowRunId:
              type: "string"
            integration_id:
              type: "string"
            inputMessage:
              type: "object"
              properties:
                messageId:
                  type: "string"
                role:
                  type: "string"
                  enum:
                    - "user"
                    - "agent"
                    - "tool"
                    - "system"
                  description: "Extended A2A message role"
                parts:
                  type: "array"
                  items:
                    oneOf:
                      - $ref: "#/components/schemas/TextPart"
                      - $ref: "#/components/schemas/ErrorPart"
                      - $ref: "#/components/schemas/DataPart"
                      - $ref: "#/components/schemas/FilePart"
                      - $ref: "#/components/schemas/ToolCallPart"
                      - $ref: "#/components/schemas/ToolResultPart"
                    discriminator:
                      propertyName: "kind"
                      mapping:
                        text: "#/components/schemas/TextPart"
                        error: "#/components/schemas/ErrorPart"
                        data: "#/components/schemas/DataPart"
                        file: "#/components/schemas/FilePart"
                        tool_call: "#/components/schemas/ToolCallPart"
                        tool_result: "#/components/schemas/ToolResultPart"
                metadata:
                  type: "object"
                  additionalProperties: {}
              required:
                - "role"
                - "parts"
            modelId:
              type: "string"
            instructions:
              type: "string"
            system_prompt:
              type: "string"
            settings:
              type: "object"
              properties:
                max_iterations:
                  type: "integer"
                  exclusiveMinimum: 0
                  maximum: 100
                  minimum: 1
                  default: 100
                  description: "Maximum iterations(llm calls) before the agent will stop executing."
                max_execution_time:
                  type: "integer"
                  minimum: 2
                  exclusiveMinimum: 0
                  maximum: 600
                  default: 600
                  description: "Maximum time (in seconds) for the agent thinking process. This does not include the time for tool calls and sub agent calls. It will be loosely enforced, the in progress LLM calls will not be terminated and the last assistant message will be returned."
                max_cost:
                  type: "number"
                  minimum: 0
                  default: 0
                  description: "Maximum cost in USD for the agent execution. When the accumulated cost exceeds this limit, the agent will stop executing. Set to 0 for unlimited. Only supported in v3 responses"
                tool_approval_required:
                  type: "string"
                  enum:
                    - "all"
                    - "respect_tool"
                    - "none"
                  default: "respect_tool"
                  description: "If all, the agent will require approval for all tools. If respect_tool, the agent will require approval for tools that have the requires_approval flag set to true. If none, the agent will not require approval for any tools."
                tools:
                  type: "array"
                  items:
                    type: "object"
                    properties:
                      id:
                        type: "string"
                        format: "ulid"
                        pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
                        readOnly: true
                        description: "The id of the resource"
                      key:
                        type: "string"
                        description: "Optional tool key for custom tools"
                      action_type:
                        type: "string"
                      display_name:
                        type: "string"
                      description:
                        type: "string"
                        description: "Optional tool description"
                      requires_approval:
                        type: "boolean"
                        default: false
                      tool_id:
                        type: "string"
                        description: "Nested tool ID for MCP tools (identifies specific tool within MCP server)"
                      conditions:
                        type: "array"
                        items:
                          type: "object"
                          properties:
                            condition:
                              type: "string"
                              description: "The argument of the tool call to evaluate"
                            operator:
                              type: "string"
                              description: "The operator to use"
                            value:
                              type: "string"
                              description: "The value to compare against"
                          required:
                            - "condition"
                            - "operator"
                            - "value"
                        default: []
                      timeout:
                        type: "number"
                        minimum: 1
                        maximum: 600
                        default: 120
                        description: "Tool execution timeout in seconds (default: 2 minutes, max: 10 minutes)"
                    required:
                      - "id"
                      - "action_type"
                  default: []
                evaluators:
                  type: "array"
                  items:
                    type: "object"
                    properties:
                      id:
                        type: "string"
                        description: "Unique key or identifier of the evaluator"
                      sample_rate:
                        type: "number"
                        minimum: 1
                        maximum: 100
                        default: 50
                        description: "The percentage of executions to evaluate with this evaluator (1-100). For example, a value of 50 means the evaluator will run on approximately half of the executions."
                      execute_on:
                        type: "string"
                        enum:
                          - "input"
                          - "output"
                        description: "Determines whether the evaluator runs on the agent input (user message) or output (agent response)."
                    required:
                      - "id"
                      - "execute_on"
                  title: "Agent evaluator configuration"
                  description: "Configuration for an evaluator applied to the agent"
                guardrails:
                  type: "array"
                  items:
                    type: "object"
                    properties:
                      id:
                        type: "string"
                        description: "Unique key or identifier of the evaluator"
                      sample_rate:
                        type: "number"
                        minimum: 1
                        maximum: 100
                        default: 50
                        description: "The percentage of executions to evaluate with this evaluator (1-100). For example, a value of 50 means the evaluator will run on approximately half of the executions."
                      execute_on:
                        type: "string"
                        enum:
                          - "input"
                          - "output"
                        description: "Determines whether the evaluator runs on the agent input (user message) or output (agent response)."
                    required:
                      - "id"
                      - "execute_on"
                  title: "Agent guardrail configuration"
                  description: "Configuration for a guardrail applied to the agent"
              default:
                max_execution_time: 600
                max_iterations: 100
                max_cost: 0
                tool_approval_required: "respect_tool"
                tools: []
            agent_manifest_id:
              type: "string"
            agent_key:
              type: "string"
            agent_description:
              type:
                - "string"
                - "null"
            agent_source:
              type:
                - "string"
                - "null"
              enum:
                - "internal"
                - "external"
                - "experiment"
                - null
            variables:
              type: "object"
              additionalProperties: {}
            tool_execution_id:
              type: "string"
            is_continuation:
              type: "boolean"
            stream:
              type: "boolean"
            responseId:
              type: "string"
          required:
            - "workflowRunId"
            - "inputMessage"
            - "modelId"
            - "instructions"
            - "system_prompt"
            - "agent_manifest_id"
            - "agent_key"
      required:
        - "type"
        - "timestamp"
        - "data"
      title: "Agent Started Event"
      description: "Emitted when the agent begins processing. Contains configuration details including the model, instructions, system prompt, and input message."
    AgentThoughtStreamingEvent:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
            - "event.agents.thought"
        timestamp:
          type: "string"
          description: "ISO timestamp of the event"
        data:
          type: "object"
          properties:
            agent_id:
              type: "string"
            message_difference:
              type: "object"
              additionalProperties:
                type: "object"
                properties:
                  messageId:
                    type: "string"
                  role:
                    type: "string"
                    enum:
                      - "user"
                      - "agent"
                      - "tool"
                      - "system"
                  parts:
                    type: "array"
                    items:
                      oneOf:
                        - $ref: "#/components/schemas/TextPart"
                        - $ref: "#/components/schemas/ErrorPart"
                        - $ref: "#/components/schemas/DataPart"
                        - $ref: "#/components/schemas/FilePart"
                        - $ref: "#/components/schemas/ToolCallPart"
                        - $ref: "#/components/schemas/ToolResultPart"
                      discriminator:
                        propertyName: "kind"
                        mapping:
                          text: "#/components/schemas/TextPart"
                          error: "#/components/schemas/ErrorPart"
                          data: "#/components/schemas/DataPart"
                          file: "#/components/schemas/FilePart"
                          tool_call: "#/components/schemas/ToolCallPart"
                          tool_result: "#/components/schemas/ToolResultPart"
                  metadata:
                    type: "object"
                    additionalProperties: {}
                  agent_id:
                    type: "string"
                  agent_execution_id:
                    type: "string"
                  workspace_id:
                    type: "string"
                required:
                  - "messageId"
                  - "role"
                  - "parts"
                  - "agent_id"
                  - "agent_execution_id"
                  - "workspace_id"
            choice:
              type: "object"
              properties:
                finish_reason:
                  type:
                    - "string"
                    - "null"
                  enum:
                    - "stop"
                    - "length"
                    - "tool_calls"
                    - "content_filter"
                    - "function_call"
                    - null
                  description: "The reason the model stopped generating tokens."
                index:
                  type: "number"
                  default: 0
                  description: "The index of the choice in the list of choices."
                message:
                  type: "object"
                  properties:
                    content:
                      type:
                        - "string"
                        - "null"
                    refusal:
                      type:
                        - "string"
                        - "null"
                    tool_calls:
                      type: "array"
                      items:
                        type: "object"
                        properties:
                          index:
                            type: "number"
                          id:
                            type: "string"
                          type:
                            type: "string"
                            enum:
                              - "function"
                          function:
                            type: "object"
                            properties:
                              name:
                                type: "string"
                                description: "The name of the function to be called. Must be a-z, A-Z, 0-9, or contain underscores and dashes, with a maximum length of 64."
                              arguments:
                                type: "string"
                                description: "The arguments to call the function with, as generated by the model in JSON format. Note that the model does not always generate valid JSON, and may hallucinate parameters not defined by your function schema. Validate the arguments in your code before calling your function."
                          thought_signature:
                            type: "string"
                            description: "Encrypted representation of the model internal reasoning state during function calling. Required by Gemini 3 models when continuing a conversation after a tool call."
                    role:
                      type: "string"
                      enum:
                        - "assistant"
                    reasoning:
                      type:
                        - "string"
                        - "null"
                      description: "Internal thought process of the model"
                    reasoning_signature:
                      type:
                        - "string"
                        - "null"
                      description: "The signature holds a cryptographic token which verifies that the thinking block was generated by the model, and is verified when thinking is part of a multiturn conversation. This value should not be modified and should always be sent to the API when the reasoning is redacted. Currently only supported by `Anthropic`."
                    redacted_reasoning:
                      type: "string"
                      description: "Occasionally the model's internal reasoning will be flagged by the safety systems of the provider. When this occurs, the provider will encrypt the reasoning. These redacted reasoning is decrypted when passed back to the API, allowing the model to continue its response without losing context."
                    audio:
                      type:
                        - "object"
                        - "null"
                      properties:
                        id:
                          type: "string"
                        expires_at:
                          type: "integer"
                        data:
                          type: "string"
                        transcript:
                          type: "string"
                      required:
                        - "id"
                        - "expires_at"
                        - "data"
                        - "transcript"
                      description: "If the audio output modality is requested, this object contains data about the audio response from the model."
                  description: "A chat completion message generated by the model."
                logprobs:
                  type:
                    - "object"
                    - "null"
                  properties:
                    content:
                      type:
                        - "array"
                        - "null"
                      items:
                        type: "object"
                        properties:
                          token:
                            type: "string"
                            description: "The token."
                          logprob:
                            type: "number"
                            description: "The log probability of this token, if it is within the top 20 most likely tokens. Otherwise, the value -9999.0 is used to signify that the token is very unlikely."
                          bytes:
                            type:
                              - "array"
                              - "null"
                            items:
                              type: "number"
                            description: "A list of integers representing the UTF-8 bytes representation of the token."
                          top_logprobs:
                            type: "array"
                            items:
                              type: "object"
                              properties:
                                token:
                                  type: "string"
                                  description: "The token."
                                logprob:
                                  type: "number"
                                  description: "The log probability of this token, if it is within the top 20 most likely tokens. Otherwise, the value -9999.0 is used to signify that the token is very unlikely."
                                bytes:
                                  type:
                                    - "array"
                                    - "null"
