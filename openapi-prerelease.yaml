  /v3/router/responses:
    post:
      description: "Creates a model response for the given input. Returns a response object or a stream of server-sent events."
      operationId: "create-router-response"
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: false
              properties:
                conversation:
                  $ref: "#/components/schemas/ConversationParam"
                  description: "Conversation context for multi-turn interactions."
                fallbacks:
                  description: "Fallback models to try if the primary model fails. Each entry specifies a model in provider/model format."
                  items:
                    $ref: "#/components/schemas/FallbackConfig"
                  type:
                    - "array"
                    - "null"
                frequency_penalty:
                  description: "Penalize new tokens based on their frequency in the text so far. Between -2.0 and 2.0."
                  format: "double"
                  type: "number"
                identity:
                  $ref: "#/components/schemas/ResponseIdentity"
                  description: "Identity/contact information for the end-user."
                input:
                  anyOf:
                    - description: "A simple text string as input."
                      title: "Text"
                      type: "string"
                    - description: "An array of input items."
                      items:
                        description: "An input item. The \"type\" field determines the item kind: \"message\", \"function_call_output\", \"item_reference\", etc."
                        properties:
                          call_id:
                            description: "The ID of the function call being responded to (for function_call_output type)."
                            type: "string"
                          content:
                            anyOf:
                              - title: "Text"
                                type: "string"
                              - items:
                                  anyOf:
                                    - description: "A text content part."
                                      properties:
                                        text:
                                          description: "The text content."
                                          type: "string"
                                        type:
                                          enum:
                                            - "input_text"
                                          type: "string"
                                      required:
                                        - "type"
                                        - "text"
                                      title: "Text"
                                      type: "object"
                                    - description: "An image content part."
                                      properties:
                                        detail:
                                          description: "The detail level for image understanding."
                                          enum:
                                            - "auto"
                                            - "low"
                                            - "high"
                                          type: "string"
                                        file_id:
                                          description: "The ID of a previously uploaded file."
                                          type: "string"
                                        image_url:
                                          description: "The URL of the image."
                                          type: "string"
                                        type:
                                          enum:
                                            - "input_image"
                                          type: "string"
                                      required:
                                        - "type"
                                      title: "Image"
                                      type: "object"
                                    - description: "A file content part. Provide file_id, file_data (base64), or file_url."
                                      properties:
                                        file_data:
                                          description: "Base64-encoded file content."
                                          type: "string"
                                        file_id:
                                          description: "The ID of a previously uploaded file."
                                          type: "string"
                                        file_url:
                                          description: "A URL to fetch the file from."
                                          type: "string"
                                        filename:
                                          description: "The name of the file."
                                          type: "string"
                                        mime_type:
                                          description: "The MIME type of the file (e.g., application/pdf)."
                                          type: "string"
                                        type:
                                          enum:
                                            - "input_file"
                                          type: "string"
                                      required:
                                        - "type"
                                      title: "File"
                                      type: "object"
                                  description: "A content part within a message."
                                title: "Content parts"
                                type: "array"
                            description: "The content of the item: a string or an array of content parts."
                          id:
                            description: "The ID of the item (for item_reference type)."
                            type: "string"
                          output:
                            description: "The output of the function call (for function_call_output type)."
                            type: "string"
                          role:
                            description: "The role of the message sender (for message items)."
                            enum:
                              - "user"
                              - "assistant"
                              - "system"
                              - "developer"
                            type: "string"
                          type:
                            description: "The type of item."
                            enum:
                              - "message"
                              - "function_call_output"
                              - "item_reference"
                            type: "string"
                        type: "object"
                      title: "Items"
                      type: "array"
                  description: "Input to the model: a string or an array of input items (messages, files, etc.)."
                instructions:
                  description: "System prompt / instructions for the model."
                  type: "string"
                max_output_tokens:
                  description: "Maximum number of tokens in the response output."
                  format: "int64"
                  type: "integer"
                max_tool_calls:
                  description: "Maximum number of tool call rounds in the agentic loop."
                  format: "int64"
                  type: "integer"
                memory:
                  $ref: "#/components/schemas/MemoryParam"
                  description: "Attach a memory store entity to enable persistent memory across requests. See Memory Stores documentation for setup."
                metadata:
                  additionalProperties: {}
                  description: "Developer-defined key-value pairs attached to the response."
                  type: "object"
                model:
                  description: "The model to use in provider/model format (e.g. openai/gpt-4o). Use agent/<key> to invoke a pre-configured agent from the orq.ai platform."
                  type: "string"
                parallel_tool_calls:
                  description: "Whether to allow parallel tool calls."
                  type: "boolean"
                presence_penalty:
                  description: "Penalize new tokens based on their presence in the text so far. Between -2.0 and 2.0."
                  format: "double"
                  type: "number"
                previous_response_id:
                  description: "The ID of a previous response to continue from. Requires store to be true (default) on the original response."
                  type: "string"
                prompt_cache_key:
                  description: "Key for prompt caching across requests."
                  type: "string"
                reasoning:
                  $ref: "#/components/schemas/ReasoningParam"
                  description: "Configure reasoning behavior. Set effort (none, minimal, low, medium, high, xhigh) to control how much the model thinks before answering. Higher effort means more reasoning tokens and better answers for complex tasks, at higher cost."
                retry:
                  $ref: "#/components/schemas/ResponseRetryConfig"
                  description: "Retry configuration. Specify the number of retries and which HTTP status codes should trigger a retry."
                safety_identifier:
                  description: "Safety identifier for content filtering."
                  type: "string"
                store:
                  description: "Whether to persist the response (default: true). When false, the response cannot be retrieved later and previous_response_id will not work for follow-up requests."
                  type: "boolean"
                stream:
                  description: "If true, returns a stream of server-sent events."
                  type: "boolean"
                stream_options:
                  $ref: "#/components/schemas/StreamOptions"
                temperature:
                  description: "Sampling temperature between 0 and 2."
                  format: "double"
                  type: "number"
                text:
                  description: "Configuration for text output."
                  properties:
                    format:
                      anyOf:
                        - properties:
