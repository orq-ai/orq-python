                      description: "Unique identifier for the contact"
                      example: "contact_01ARZ3NDEKTSV4RRFFQ69G5FAV"
                    display_name:
                      type: "string"
                      description: "Display name of the contact"
                      example: "Jane Doe"
                    email:
                      type: "string"
                      format: "email"
                      description: "Email address of the contact"
                      example: "jane.doe@example.com"
                    metadata:
                      type: "array"
                      items:
                        type: "object"
                        additionalProperties: {}
                      description: "A hash of key/value pairs containing any other data about the contact"
                      example:
                        - department: "Engineering"
                          role: "Senior Developer"
                    logo_url:
                      type: "string"
                      description: "URL to the contact's avatar or logo"
                      example: "https://example.com/avatars/jane-doe.jpg"
                    tags:
                      type: "array"
                      items:
                        type: "string"
                      description: "A list of tags associated with the contact"
                      example:
                        - "hr"
                        - "engineering"
                  required:
                    - "id"
                  description: "@deprecated Use identity instead. Information about the contact making the request."
                  deprecated: true
                thread:
                  type: "object"
                  properties:
                    id:
                      type: "string"
                      description: "Unique thread identifier to group related invocations."
                      example: "thread_01ARZ3NDEKTSV4RRFFQ69G5FAV"
                    tags:
                      type: "array"
                      items:
                        type: "string"
                      description: "Optional tags to differentiate or categorize threads"
                      example:
                        - "customer-support"
                        - "priority-high"
                  required:
                    - "id"
                  description: "Thread information to group related requests"
                memory:
                  type: "object"
                  properties:
                    entity_id:
                      type: "string"
                      description: "An entity ID used to link memory stores to a specific user, session, or conversation. This ID is used to isolate and retrieve memories specific to the entity across agent executions."
                  required:
                    - "entity_id"
                  description: "Memory configuration for the agent execution. Used to associate memory stores with specific entities like users or sessions."
                metadata:
                  type: "object"
                  additionalProperties: {}
                  description: "Optional metadata for the agent invocation as key-value pairs that will be included in traces"
                engine:
                  type: "string"
                  enum:
                    - "text"
                    - "jinja"
                    - "mustache"
                  description: "Override template engine for this invocation. If not provided, uses the agent default."
                configuration:
                  type: "object"
                  properties:
                    blocking:
                      type: "boolean"
                      default: false
                      description: "Whether to block until the agent task completes. When true, the response will include the full task with messages. When false (default), returns immediately with task ID and status."
                  description: "Configuration options for the agent invocation"
                background:
                  type: "boolean"
                  default: false
                  description: "If true, returns immediately without waiting for completion. If false (default), waits until the agent becomes inactive or errors."
                stream:
                  type: "boolean"
                  default: false
                  description: "If true, returns Server-Sent Events (SSE) streaming response with real-time events. If false (default), returns standard JSON response."
                conversation:
                  type: "object"
                  properties:
                    _id:
                      type: "string"
                      minLength: 1
                      description: "Unique ULID identifier for the conversation, prefixed with \"conv_\". Used to link agent executions to a specific conversation thread."
                  required:
                    - "_id"
                  description: "Conversation context for chat studio integration"
              required:
                - "message"
      responses:
        "200":
          description: "Agent response successfully created and completed. Returns the full conversation including all messages, tool interactions, model used, and token usage statistics. In background mode, returns immediately with initial task details. In streaming mode, returns Server-Sent Events (SSE) with real-time events."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgentResponse"
            text/event-stream:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ResponseStreamingEvent"
              x-speakeasy-sse-sentinel: "[DONE]"
      security:
        - ApiKey: []
  /v2/agents/{agent_key}/responses/{task_id}:
    get:
      tags:
        - "Agents"
      x-speakeasy-group: "agents.responses"
      x-speakeasy-name-override: "get"
      x-cli-group: "agents"
      x-cli-name: "getResponse"
      operationId: "GetAgentResponse"
      summary: "Get response"
      description: "Retrieves the current state of an agent response by task ID. Returns the response output, model information, token usage, and execution status. When the agent is still processing, the output array will be empty and status will be `in_progress`. Once completed, the response includes the full output, usage statistics, and finish reason."
      parameters:
        - schema:
            type: "string"
            description: "The unique key identifier of the agent"
          required: true
          description: "The unique key identifier of the agent"
          name: "agent_key"
          in: "path"
        - schema:
            type: "string"
            description: "The agent execution task ID returned from create response"
          required: true
          description: "The agent execution task ID returned from create response"
          name: "task_id"
          in: "path"
      responses:
        "200":
          description: "Response retrieved successfully. Returns the current state of the agent execution including output messages, model used, token usage, and status."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAgentResponse"
        "404":
          description: "Response not found. The specified task ID does not exist for this agent or workspace."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HonoApiError"
      security:
        - ApiKey: []
  /v2/agents/{agent_key}:
    delete:
      tags:
        - "Agents"
      x-speakeasy-group: "agents"
      x-speakeasy-name-override: "delete"
      x-cli-group: "agents"
      x-cli-name: "delete"
      x-speakeasy-max-method-params: 1
      operationId: "DeleteAgent"
      summary: "Delete agent"
      description: "Permanently removes an agent from the workspace. This operation is irreversible and will delete all associated configuration including model assignments, tools, knowledge bases, memory stores, and cached data. Active agent sessions will be terminated, and the agent key will become available for reuse."
      parameters:
        - schema:
            type: "string"
            description: "The unique key of the agent to delete"
          required: true
          description: "The unique key of the agent to delete"
          name: "agent_key"
          in: "path"
      responses:
        "204":
          description: "Agent successfully deleted. No content is returned, but the agent has been permanently removed from the workspace."
        "404":
          description: "Agent not found. The specified agent key does not exist in the workspace or has already been deleted."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message:
                    type: "string"
                required:
                  - "message"
      security:
        - ApiKey: []
    get:
      tags:
        - "Agents"
