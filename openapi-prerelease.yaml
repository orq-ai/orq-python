                - "model"
      responses:
        "200":
          description: "Returns the embedding vector."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  object:
                    type: "string"
                    enum:
                      - "list"
                  data:
                    type: "array"
                    items:
                      type: "object"
                      properties:
                        object:
                          type: "string"
                          enum:
                            - "embedding"
                          description: "The object type, which is always `embedding`."
                        embedding:
                          anyOf:
                            - type: "array"
                              items:
                                type: "number"
                            - type: "string"
                          description: "The embedding vector, which is a list of floats. The length of vector depends on the model."
                        index:
                          type: "number"
                          description: "The index of the embedding in the list of embeddings."
                      required:
                        - "object"
                        - "embedding"
                        - "index"
                  model:
                    type: "string"
                    description: "ID of the model to used."
                  usage:
                    type: "object"
