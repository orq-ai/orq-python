      operationId: "RetrieveAgentRequest"
      summary: "Retrieve agent"
      description: "Retrieves detailed information about a specific agent identified by its unique key or identifier. Returns the complete agent manifest including configuration settings, model assignments (primary and fallback), tools, knowledge bases, memory stores, instructions, and execution parameters. Use this endpoint to fetch the current state and configuration of an individual agent."
      parameters:
        - schema:
