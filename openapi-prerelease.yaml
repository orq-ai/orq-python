                                      required:
                                        - "call_timeout"
                                      description: "Timeout configuration to apply to the request. If the request exceeds the timeout, it will be retried or fallback to the next model if configured."
                                  description: "Optional model parameters specific to this fallback model. Overrides primary model parameters if this fallback is used."
                                retry:
                                  type: "object"
