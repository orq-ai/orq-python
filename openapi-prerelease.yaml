                    title: "Fallback Model Configuration"
                    description: "Fallback model for automatic failover when primary model request fails. Supports optional parameter overrides. Can be a simple model ID string or a configuration object with model-specific parameters. Fallbacks are tried in order."
                  description: "Optional array of fallback models used when the primary model fails. Fallbacks are attempted in order. All models must support tool calling."
                settings:
                  type: "object"
