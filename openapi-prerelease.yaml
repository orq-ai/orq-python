                                                  type: "string"
                                                  enum:
                                                    - "input_text"
                                                  description: "The type of input content"
                                                text:
                                                  type: "string"
                                                  description: "The text content"
                                              required:
                                                - "type"
                                                - "text"
                                              description: "A text input content part"
                                            - type: "object"
                                              properties:
                                                type:
                                                  type: "string"
                                                  enum:
                                                    - "input_image"
                                                  description: "The type of input content part"
                                                detail:
                                                  type: "string"
                                                  enum:
                                                    - "high"
                                                    - "low"
                                                    - "auto"
                                                  default: "auto"
                                                  description: "Level of detail for image analysis"
                                                file_id:
                                                  type:
                                                    - "string"
                                                    - "null"
                                                  description: "File ID for the image"
                                                image_url:
                                                  type:
                                                    - "string"
                                                    - "null"
