      x-speakeasy-name-override: "list"
      security:
        - ApiKey: []
    post:
      description: "Creates a schedule that runs the agent on a recurring or one-off cadence. The minimum firing interval is 1 hour for `cron` and `interval`; `once` schedules are exempt."
      operationId: "create-agent-schedule"
      parameters:
        - description: "The unique routing key of the agent the schedule belongs to."
          in: "path"
          name: "agent_key"
          required: true
          schema:
            description: "The unique routing key of the agent the schedule belongs to."
            type: "string"
      requestBody:
        content:
          application/json:
            examples:
              daily_cron:
                summary: "Daily cron at 9am UTC on weekdays"
                value:
                  agent_tag: "v2"
                  expression: "0 0 9 * * mon-fri"
                  payload:
                    input: "Generate the morning briefing for {{region}}"
                    memory_entity_id: "mem_entity_123"
                    metadata:
                      run_source: "daily-briefing"
                    variables:
                      region: "EMEA"
                  type: "cron"
              hourly_interval:
                summary: "Hourly interval (minimum allowed cadence)"
                value:
                  expression: "@every 1h"
                  payload:
                    input: "Summarize new tickets from the last hour"
                  type: "interval"
              once_future_at:
                summary: "One-off run at a specific time"
                value:
                  expression: "@at 2026-05-01T09:00:00Z"
                  payload:
                    input: "Check in on ticket TICKET-123 and post a status update."
                  type: "once"
            schema:
              additionalProperties: false
              properties:
                agent_tag:
                  description: "Pin this schedule to a specific agent version. Omit to always use the active version."
                  type: "string"
                expression:
                  description: "Schedule expression. Examples: cron '0 0 9 * * mon-fri' (9am UTC weekdays), interval '@every 1h', once '@at 2026-05-01T09:00:00Z'. Minimum firing cadence is 1 hour for cron and interval."
                  type: "string"
                payload:
                  $ref: "#/components/schemas/PublicSchedulePayload"
                  description: "Invocation payload delivered to the agent on every firing."
                type:
                  description: "Schedule type. cron uses 6-field cron expressions; interval uses @every <duration>; once uses @at <RFC3339-UTC>."
                  enum:
                    - "cron"
                    - "once"
                    - "interval"
                  type: "string"
              required:
                - "type"
                - "expression"
                - "payload"
              type: "object"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  _id:
                    description: "ULID identifying this schedule."
                    type: "string"
                  agent_key:
                    type: "string"
                  agent_tag:
                    description: "Pinned agent version. Omit to always run the agent's current active version."
                    type: "string"
                  created:
                    format: "date-time"
                    type: "string"
                  created_by_id:
                    description: "ID of the API key that created the schedule."
                    type: "string"
                  expression:
                    description: "Cron expression (6-field, seconds required), @every duration, @at RFC3339 timestamp, or a predefined descriptor like @hourly/@daily."
                    type: "string"
                  generation:
                    description: "Monotonic counter bumped when the schedule's firing cadence changes. Used by the consumer to skip stale in-flight triggers."
                    format: "int64"
                    type: "integer"
                  is_active:
                    description: "Whether the schedule is currently firing. once schedules flip to false automatically after firing."
                    type: "boolean"
                  last_triggered_at:
                    description: "Timestamp of the most recent firing, if any."
                    format: "date-time"
                    type: "string"
                  payload:
                    $ref: "#/components/schemas/PublicSchedulePayload"
                  trigger_count:
                    description: "Total firings since creation or last expression/type change."
                    format: "int64"
                    type: "integer"
                  type:
                    description: "Schedule type."
                    enum:
                      - "cron"
                      - "once"
                      - "interval"
                    type: "string"
                  updated:
                    format: "date-time"
                    type: "string"
                  workspace_id:
                    type: "string"
                required:
                  - "_id"
                  - "workspace_id"
                  - "agent_key"
                  - "type"
                  - "expression"
                  - "is_active"
                  - "generation"
                  - "payload"
                  - "created_by_id"
                  - "created"
                  - "updated"
                  - "trigger_count"
                type: "object"
          description: "Schedule created."
        "400":
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  error:
                    $ref: "#/components/schemas/PublicScheduleErrorDetail"
                required:
                  - "error"
                type: "object"
          description: "Invalid schedule type, expression, or sub-hour cadence."
        "404":
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  error:
                    $ref: "#/components/schemas/PublicScheduleErrorDetail"
                required:
                  - "error"
                type: "object"
          description: "Agent (or agent version, when agent_tag is set) not found."
      summary: "Create schedule"
      tags:
        - "Agent Schedules"
      x-cli-group: "schedules"
      x-cli-name: "create"
      x-orq-gateway-group: true
      x-speakeasy-group: "schedules"
      x-speakeasy-name-override: "create"
