  /v2/agents/{key}/task:
    post:
      tags:
        - "Agents"
      x-cli-group: "agents"
      x-cli-name: "invoke"
      deprecated: true
      x-speakeasy-group: "agents"
      x-speakeasy-name-override: "invoke"
      x-speakeasy-max-method-params: 11
      operationId: "InvokeAgent"
      summary: "Execute an agent task"
      description: "Invokes an agent to perform a task with the provided input message. The agent will process the request using its configured model and tools, maintaining context through memory stores if configured. Supports automatic model fallback on primary model failure, tool execution, knowledge base retrieval, and continuation of previous conversations. Returns a task response that can be used to track execution status and retrieve results."
      parameters:
        - schema:
            type: "string"
            description: "The key or ID of the agent to invoke"
          required: true
          description: "The key or ID of the agent to invoke"
          name: "key"
          in: "path"
      requestBody:
        content:
          application/json:
            schema:
              type: "object"
              properties:
                task_id:
                  type: "string"
                  description: "Optional task ID to continue an existing agent execution. When provided, the agent will continue the conversation from the existing task state. The task must be in an inactive state to continue."
                message:
                  type: "object"
                  properties:
                    messageId:
                      type: "string"
                      description: "Optional A2A message ID in ULID format"
                    role:
                      anyOf:
                        - type: "string"
                          enum:
                            - "user"
                          title: "User message"
                          description: "Message from the end user"
                        - type: "string"
                          enum:
                            - "tool"
                          title: "Tool message"
                          description: "Message containing tool execution results"
                      description: "Message role (user or tool for continuing executions)"
                    parts:
                      type: "array"
                      items:
                        oneOf:
                          - allOf:
                              - $ref: "#/components/schemas/TextPart"
                              - description: "Text content part. Use this to send text messages to the agent."
                          - allOf:
                              - $ref: "#/components/schemas/FilePart"
                              - description: "File attachment part. Use this to send files (images, documents, etc.) to the agent for processing."
                          - allOf:
                              - $ref: "#/components/schemas/ToolResultPart"
                              - description: "Tool execution result part. Use this ONLY when providing results for a pending tool call from the agent. The tool_call_id must match the ID from the agent's tool call request."
                          - allOf:
                              - $ref: "#/components/schemas/ErrorPart"
                              - description: "Error content part. Generated by the system when an error occurs during agent execution."
                        discriminator:
                          propertyName: "kind"
                          mapping:
                            text: "#/components/schemas/TextPart"
                            file: "#/components/schemas/FilePart"
                            tool_result: "#/components/schemas/ToolResultPart"
                            error: "#/components/schemas/ErrorPart"
                        title: "Public Message Part"
                        description: "Message part that can be provided by users. Use \"text\" for regular messages, \"file\" for attachments, or \"tool_result\" when responding to tool call requests."
                      description: "A2A message parts (text, file, or tool_result only). Note: Tool role messages must only contain tool_result parts."
                  required:
                    - "role"
                    - "parts"
                  title: "A2A Message"
                  description: "The A2A message to send to the agent (user input or tool results)"
                variables:
                  type: "object"
                  additionalProperties: {}
                  description: "Optional variables for template replacement in system prompt, instructions, and messages"
                identity:
                  type: "object"
                  properties:
                    id:
                      type: "string"
                      description: "Unique identifier for the contact"
                      example: "contact_01ARZ3NDEKTSV4RRFFQ69G5FAV"
                    display_name:
                      type: "string"
                      description: "Display name of the contact"
                      example: "Jane Doe"
                    email:
                      type: "string"
                      format: "email"
                      description: "Email address of the contact"
                      example: "jane.doe@example.com"
                    metadata:
                      type: "array"
                      items:
                        type: "object"
                        additionalProperties: {}
                      description: "A hash of key/value pairs containing any other data about the contact"
                      example:
                        - department: "Engineering"
                          role: "Senior Developer"
                    logo_url:
                      type: "string"
                      description: "URL to the contact's avatar or logo"
                      example: "https://example.com/avatars/jane-doe.jpg"
                    tags:
                      type: "array"
                      items:
                        type: "string"
                      description: "A list of tags associated with the contact"
                      example:
                        - "hr"
                        - "engineering"
                  required:
                    - "id"
                  description: "Information about the identity making the request. If the identity does not exist, it will be created automatically."
                contact:
                  type: "object"
                  properties:
                    id:
                      type: "string"
                      description: "Unique identifier for the contact"
                      example: "contact_01ARZ3NDEKTSV4RRFFQ69G5FAV"
                    display_name:
                      type: "string"
                      description: "Display name of the contact"
                      example: "Jane Doe"
                    email:
                      type: "string"
                      format: "email"
                      description: "Email address of the contact"
                      example: "jane.doe@example.com"
                    metadata:
                      type: "array"
                      items:
                        type: "object"
                        additionalProperties: {}
                      description: "A hash of key/value pairs containing any other data about the contact"
                      example:
                        - department: "Engineering"
                          role: "Senior Developer"
                    logo_url:
                      type: "string"
                      description: "URL to the contact's avatar or logo"
                      example: "https://example.com/avatars/jane-doe.jpg"
                    tags:
                      type: "array"
                      items:
                        type: "string"
                      description: "A list of tags associated with the contact"
                      example:
                        - "hr"
                        - "engineering"
                  required:
                    - "id"
                  description: "@deprecated Use identity instead. Information about the contact making the request."
                  deprecated: true
                thread:
                  type: "object"
                  properties:
                    id:
                      type: "string"
                      description: "Unique thread identifier to group related invocations."
                      example: "thread_01ARZ3NDEKTSV4RRFFQ69G5FAV"
                    tags:
                      type: "array"
                      items:
                        type: "string"
                      description: "Optional tags to differentiate or categorize threads"
                      example:
                        - "customer-support"
                        - "priority-high"
                  required:
                    - "id"
                  description: "Thread information to group related requests"
                memory:
                  type: "object"
                  properties:
                    entity_id:
                      type: "string"
                      description: "An entity ID used to link memory stores to a specific user, session, or conversation. This ID is used to isolate and retrieve memories specific to the entity across agent executions."
                  required:
                    - "entity_id"
                  description: "Memory configuration for the agent execution. Used to associate memory stores with specific entities like users or sessions."
                metadata:
                  type: "object"
                  additionalProperties: {}
                  description: "Optional metadata for the agent invocation as key-value pairs that will be included in traces"
                engine:
                  type: "string"
                  enum:
                    - "text"
                    - "jinja"
                    - "mustache"
                  description: "Override template engine for this invocation. If not provided, uses the agent default."
                configuration:
                  type: "object"
                  properties:
                    blocking:
                      type: "boolean"
                      default: false
                      description: "Whether to block until the agent task completes. When true, the response will include the full task with messages. When false (default), returns immediately with task ID and status."
                  description: "Configuration options for the agent invocation"
              required:
                - "message"
      responses:
        "200":
          description: "Agent task successfully initiated. Returns the task details including task ID, execution status, and initial response. Use the task ID to track execution progress and retrieve full results."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  id:
                    type: "string"
                    description: "The unique ID of the created agent execution task"
                  contextId:
                    type: "string"
                    description: "The correlation ID for this execution (used for tracking)"
                  kind:
                    type: "string"
                    enum:
                      - "task"
                    description: "A2A entity type identifier"
                  status:
                    type: "object"
                    properties:
                      state:
                        type: "string"
                        enum:
                          - "submitted"
                          - "working"
                          - "input-required"
                          - "auth-required"
                          - "completed"
                          - "failed"
                          - "canceled"
                          - "rejected"
                        title: "Task State"
                        description: "Current state of the agent task execution. Values: submitted (queued), working (executing), input-required (awaiting user input), completed (finished successfully), failed (error occurred). Note: auth-required, canceled, and rejected statuses are defined for A2A protocol compatibility but are not currently supported in task execution."
                      timestamp:
                        type: "string"
                        description: "ISO 8601 timestamp of when the status was updated"
                      message:
                        type: "object"
                        properties:
                          kind:
                            type: "string"
                            enum:
                              - "message"
                          messageId:
                            type: "string"
                          role:
                            type: "string"
                            enum:
                              - "user"
                              - "agent"
                              - "tool"
                              - "system"
                            title: "Extended Message Role"
                            description: "Role of the message sender in the A2A protocol. Values: user (end user), agent (AI agent), tool (tool execution result), system (system instructions/prompts)."
                          parts:
                            type: "array"
                            items:
                              oneOf:
                                - $ref: "#/components/schemas/TextPart"
                                - $ref: "#/components/schemas/ErrorPart"
                                - $ref: "#/components/schemas/DataPart"
                                - $ref: "#/components/schemas/FilePart"
                                - $ref: "#/components/schemas/ToolCallPart"
                                - $ref: "#/components/schemas/ToolResultPart"
                              discriminator:
                                propertyName: "kind"
                                mapping:
                                  text: "#/components/schemas/TextPart"
                                  error: "#/components/schemas/ErrorPart"
                                  data: "#/components/schemas/DataPart"
                                  file: "#/components/schemas/FilePart"
                                  tool_call: "#/components/schemas/ToolCallPart"
                                  tool_result: "#/components/schemas/ToolResultPart"
                        required:
                          - "kind"
                          - "messageId"
                          - "role"
                          - "parts"
                        title: "Task Status Message"
                        description: "Optional A2A message providing additional context about the current status"
                    required:
                      - "state"
                    title: "Task Status"
                    description: "Current task status information"
