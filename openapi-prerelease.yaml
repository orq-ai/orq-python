  /v2/agents/{agent_key}/responses:
    post:
      tags:
        - "Agents"
      x-speakeasy-group: "agents.responses"
      x-speakeasy-name-override: "create"
      x-speakeasy-max-method-params: 13
      x-cli-group: "agents-responses"
      x-cli-name: "create"
      x-code-samples:
        - lang: "curl"
          label: "cURL"
          source: "curl --request POST \\\n  --url 'https://api.orq.ai/v2/agents/customer_support/responses' \\\n  --header 'Authorization: Bearer $ORQ_API_KEY' \\\n  --header 'Content-Type: application/json' \\\n  --data '{\n    \"message\": {\n      \"role\": \"user\",\n      \"parts\": [\n        {\n          \"kind\": \"text\",\n          \"text\": \"Hi! I am testing your capabilities. Can you describe what you can do?\"\n        }\n      ]\n    }\n  }'"
        - lang: "python"
          label: "Python"
          source: "import os\nfrom orq_ai_sdk import Orq\n\nclient = Orq(\n    api_key=os.environ.get(\"ORQ_API_KEY\")\n)\n\nresponse = client.agents.responses.create(\n    agent_key=\"customer_support\",\n    message={\n        \"role\": \"user\",\n        \"parts\": [\n            {\n                \"kind\": \"text\",\n                \"text\": \"Hi! I am testing your capabilities. Can you describe what you can do?\"\n            }\n        ]\n    }\n)\n\nprint(response.output[0].parts[0].text)\nprint(response.usage)"
        - lang: "typescript"
          label: "Node.js"
          source: "import { Orq } from '@orq-ai/node';\n\nconst client = new Orq({\n  apiKey: process.env.ORQ_API_KEY,\n});\n\nconst response = await client.agents.responses.create({\n  agentKey: 'customer_support',\n  message: {\n    role: 'user',\n    parts: [\n      {\n        kind: 'text',\n        text: 'Hi! I am testing your capabilities. Can you describe what you can do?',\n      },\n    ],\n  }\n});\n\nconsole.log(response.output[0].parts[0].text);\nconsole.log(response.usage);"
      operationId: "CreateAgentResponseRequest"
      summary: "Create response"
      description: "Initiates an agent conversation and returns a complete response. This endpoint manages the full lifecycle of an agent interaction, from receiving the initial message through all processing steps until completion. Supports synchronous execution (waits for completion) and asynchronous execution (returns immediately with task ID). The response includes all messages exchanged, tool calls made, and token usage statistics. Ideal for request-response patterns where you need the complete interaction result."
      parameters:
        - schema:
            type: "string"
            description: "The unique key of identifier of the agent to invoke"
          required: true
          description: "The unique key of identifier of the agent to invoke"
          name: "agent_key"
          in: "path"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              properties:
                task_id:
                  type: "string"
                  description: "Optional task ID to continue an existing agent execution. When provided, the agent will continue the conversation from the existing task state. The task must be in an inactive state to continue."
                message:
                  type: "object"
                  properties:
                    messageId:
                      type: "string"
                      description: "Optional A2A message ID in ULID format"
                    role:
                      anyOf:
                        - type: "string"
                          enum:
                            - "user"
                          title: "User message"
                          description: "Message from the end user"
                        - type: "string"
                          enum:
                            - "tool"
                          title: "Tool message"
                          description: "Message containing tool execution results"
                      description: "Message role (user or tool for continuing executions)"
                    parts:
                      type: "array"
                      items:
                        oneOf:
                          - allOf:
