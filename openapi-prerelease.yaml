      responses:
        "200":
          description: "Agent execution initiated successfully. Returns task details including the task ID, execution status, and agent response. The task ID can be used to track execution progress and retrieve results."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  id:
                    type: "string"
                    description: "The unique ID of the created agent execution task"
                  contextId:
                    type: "string"
                    description: "The correlation ID for this execution (used for tracking)"
                  kind:
                    type: "string"
                    enum:
                      - "task"
                    description: "A2A entity type identifier"
                  status:
                    type: "object"
                    properties:
                      state:
                        type: "string"
                        enum:
                          - "submitted"
                          - "working"
                          - "input-required"
                          - "auth-required"
                          - "completed"
                          - "failed"
                          - "canceled"
                          - "rejected"
                        title: "Task State"
                        description: "Current state of the agent task execution. Values: submitted (queued), working (executing), input-required (awaiting user input), completed (finished successfully), failed (error occurred). Note: auth-required, canceled, and rejected statuses are defined for A2A protocol compatibility but are not currently supported in task execution."
                      timestamp:
                        type: "string"
                        description: "ISO 8601 timestamp of when the status was updated"
                      message:
                        type: "object"
                        properties:
                          kind:
                            type: "string"
                            enum:
                              - "message"
                          messageId:
                            type: "string"
                          role:
                            type: "string"
                            enum:
                              - "user"
                              - "agent"
                              - "tool"
                              - "system"
                            title: "Extended Message Role"
                            description: "Role of the message sender in the A2A protocol. Values: user (end user), agent (AI agent), tool (tool execution result), system (system instructions/prompts)."
                          parts:
                            type: "array"
                            items:
                              oneOf:
                                - $ref: "#/components/schemas/TextPart"
                                - $ref: "#/components/schemas/ErrorPart"
                                - $ref: "#/components/schemas/DataPart"
                                - $ref: "#/components/schemas/FilePart"
                                - $ref: "#/components/schemas/ToolCallPart"
                                - $ref: "#/components/schemas/ToolResultPart"
                              discriminator:
                                propertyName: "kind"
                                mapping:
                                  text: "#/components/schemas/TextPart"
                                  error: "#/components/schemas/ErrorPart"
                                  data: "#/components/schemas/DataPart"
                                  file: "#/components/schemas/FilePart"
                                  tool_call: "#/components/schemas/ToolCallPart"
                                  tool_result: "#/components/schemas/ToolResultPart"
                        required:
                          - "kind"
                          - "messageId"
                          - "role"
                          - "parts"
                        title: "Task Status Message"
                        description: "Optional A2A message providing additional context about the current status"
                    required:
                      - "state"
                    title: "Task Status"
                    description: "Current task status information"
                  messages:
                    type: "array"
                    description: "Array of messages in the task conversation. Only present when blocking mode is enabled."
                    items:
                      $ref: "#/components/schemas/ExtendedMessage"
                  metadata:
                    type: "object"
                    additionalProperties: {}
                    description: "Task metadata containing workspace_id and trace_id for feedback and tracking"
                required:
                  - "id"
                  - "contextId"
                  - "kind"
                  - "status"
                title: "A2A Task Response"
                description: "Response format following the Agent-to-Agent (A2A) protocol. Returned when starting or continuing an agent task execution."
      security:
        - ApiKey: []
  /v2/agents/stream-run:
    post:
      tags:
        - "Agents"
      x-cli-group: "agents"
      x-cli-name: "streamRun"
      deprecated: true
      x-speakeasy-group: "agents"
      x-speakeasy-name-override: "streamRun"
      x-speakeasy-max-method-params: 22
      operationId: "StreamRunAgent"
      summary: "Run agent with streaming response"
      description: "Dynamically configures and executes an agent while streaming the interaction in real-time via Server-Sent Events (SSE). Intelligently manages agent versioning by reusing existing agents with matching configurations or creating new versions when configurations differ. Combines the flexibility of inline configuration with real-time streaming, making it ideal for dynamic agent interactions with live feedback. The stream provides continuous updates including message chunks, tool executions, and status changes until completion or timeout."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              properties:
                key:
                  type: "string"
                  minLength: 1
                  pattern: "^[A-Za-z][A-Za-z0-9]*([._-][A-Za-z0-9]+)*$"
                  description: "A unique identifier for the agent. This key must be unique within the same workspace and cannot be reused. When executing the agent, this key determines if the agent already exists. If the agent version differs, a new version is created at the end of the execution, except for the task. All agent parameters are evaluated to decide if a new version is needed."
                task_id:
                  type: "string"
                  description: "Optional task ID to continue an existing agent execution. When provided, the agent will continue the conversation from the existing task state. The task must be in an inactive state to continue."
                model:
                  anyOf:
                    - type: "string"
                      description: "\n\nA model ID string (e.g., `openai/gpt-4o` or `anthropic/claude-haiku-4-5-20251001`). The agent can be run with a wide range of models with different capabilities, performance characteristics, and price points. Only models that support tool calling (function_calling) can be used to run agents. See (supported models)[/docs/proxy/supported-models] documentation for the complete list of available models."
                    - type: "object"
                      properties:
                        id:
                          type: "string"
                          description: "A model ID string (e.g., `openai/gpt-4o` or `anthropic/claude-haiku-4-5-20251001`). Only models that support tool calling can be used with agents."
                        parameters:
                          type: "object"
                          properties:
                            name:
                              type: "string"
                              description: "The name to display on the trace. If not specified, the default system name will be used."
                            frequency_penalty:
                              type:
                                - "number"
                                - "null"
                              description: "Number between -2.0 and 2.0. Positive values penalize new tokens based on their existing frequency in the text so far, decreasing the model's likelihood to repeat the same line verbatim."
                            max_tokens:
                              type:
                                - "integer"
                                - "null"
                              description: "`[Deprecated]`. The maximum number of tokens that can be generated in the chat completion. This value can be used to control costs for text generated via API. \n\n This value is now `deprecated` in favor of `max_completion_tokens`, and is not compatible with o1 series models."
                            max_completion_tokens:
                              type:
                                - "integer"
                                - "null"
                              exclusiveMinimum: 0
                              description: "An upper bound for the number of tokens that can be generated for a completion, including visible output tokens and reasoning tokens"
                            presence_penalty:
                              type:
                                - "number"
                                - "null"
                              description: "Number between -2.0 and 2.0. Positive values penalize new tokens based on whether they appear in the text so far, increasing the model's likelihood to talk about new topics."
                            response_format:
                              oneOf:
                                - type: "object"
                                  properties:
                                    type:
                                      type: "string"
                                      enum:
                                        - "text"
                                  required:
                                    - "type"
                                  title: "Text"
                                  description: "\n\nDefault response format. Used to generate text responses"
                                - type: "object"
                                  properties:
                                    type:
                                      type: "string"
                                      enum:
                                        - "json_object"
                                  required:
                                    - "type"
                                  title: "JSON object"
                                  description: "\n\nJSON object response format. An older method of generating JSON responses. Using `json_schema` is recommended for models that support it. Note that the model will not generate JSON without a system or user message instructing it to do so."
                                - type: "object"
                                  properties:
                                    type:
                                      type: "string"
                                      enum:
                                        - "json_schema"
                                    json_schema:
                                      type: "object"
                                      properties:
                                        description:
                                          type: "string"
                                          description: "A description of what the response format is for, used by the model to determine how to respond in the format."
                                        name:
                                          type: "string"
                                          description: "The name of the response format. Must be a-z, A-Z, 0-9, or contain underscores and dashes, with a maximum length of 64."
                                        schema:
                                          description: "The schema for the response format, described as a JSON Schema object."
                                        strict:
                                          type: "boolean"
                                          default: false
                                          description: "Whether to enable strict schema adherence when generating the output. If set to true, the model will always follow the exact schema defined in the schema field. Only a subset of JSON Schema is supported when strict is true."
                                      required:
                                        - "name"
                                  required:
                                    - "type"
                                    - "json_schema"
                                  title: "JSON schema"
                                  description: "\n\nJSON Schema response format. Used to generate structured JSON responses"
                              description: "An object specifying the format that the model must output"
                            reasoning_effort:
                              type: "string"
                              enum:
                                - "none"
                                - "minimal"
                                - "low"
                                - "medium"
                                - "high"
                                - "xhigh"
                              description: "Constrains effort on reasoning for [reasoning models](https://platform.openai.com/docs/guides/reasoning). Currently supported values are `none`, `minimal`, `low`, `medium`, `high`, and `xhigh`. Reducing reasoning effort can result in faster responses and fewer tokens used on reasoning in a response.\n\n- `gpt-5.1` defaults to `none`, which does not perform reasoning. The supported reasoning values for `gpt-5.1` are `none`, `low`, `medium`, and `high`. Tool calls are supported for all reasoning values in gpt-5.1.\n- All models before `gpt-5.1` default to `medium` reasoning effort, and do not support `none`.\n- The `gpt-5-pro` model defaults to (and only supports) `high` reasoning effort.\n- `xhigh` is currently only supported for `gpt-5.1-codex-max`.\n\nAny of \"none\", \"minimal\", \"low\", \"medium\", \"high\", \"xhigh\"."
                            verbosity:
                              type: "string"
                              description: "Adjusts response verbosity. Lower levels yield shorter answers."
                            seed:
                              type:
                                - "number"
                                - "null"
                              description: "If specified, our system will make a best effort to sample deterministically, such that repeated requests with the same seed and parameters should return the same result."
                            stop:
                              anyOf:
                                - type: "string"
                                - type: "array"
                                  items:
                                    type: "string"
                                  maxItems: 4
                                - type: "null"
                              description: "Up to 4 sequences where the API will stop generating further tokens."
                            thinking:
                              oneOf:
                                - $ref: "#/components/schemas/ThinkingConfigDisabledSchema"
                                - $ref: "#/components/schemas/ThinkingConfigEnabledSchema"
                                - $ref: "#/components/schemas/ThinkingConfigAdaptiveSchema"
                              discriminator:
                                propertyName: "type"
                                mapping:
                                  disabled: "#/components/schemas/ThinkingConfigDisabledSchema"
                                  enabled: "#/components/schemas/ThinkingConfigEnabledSchema"
                                  adaptive: "#/components/schemas/ThinkingConfigAdaptiveSchema"
                            temperature:
                              type:
                                - "number"
                                - "null"
                              minimum: 0
                              maximum: 2
                              description: "What sampling temperature to use, between 0 and 2. Higher values like 0.8 will make the output more random, while lower values like 0.2 will make it more focused and deterministic."
                            top_p:
                              type:
                                - "number"
                                - "null"
                              minimum: 0
                              maximum: 1
                              description: "An alternative to sampling with temperature, called nucleus sampling, where the model considers the results of the tokens with top_p probability mass. "
                            top_k:
                              type:
                                - "number"
                                - "null"
                              description: "Limits the model to consider only the top k most likely tokens at each step."
                            tool_choice:
                              anyOf:
                                - type: "string"
                                  enum:
                                    - "none"
                                    - "auto"
                                    - "required"
                                - type: "object"
                                  properties:
                                    type:
                                      type: "string"
                                      enum:
                                        - "function"
                                      description: "The type of the tool. Currently, only function is supported."
                                    function:
                                      type: "object"
                                      properties:
                                        name:
                                          type: "string"
                                          description: "The name of the function to call."
                                      required:
                                        - "name"
                                  required:
                                    - "function"
                              description: "Controls which (if any) tool is called by the model."
                            parallel_tool_calls:
                              type: "boolean"
                              description: "Whether to enable parallel function calling during tool use."
                            modalities:
                              type:
                                - "array"
                                - "null"
                              items:
                                type: "string"
                                enum:
                                  - "text"
                                  - "audio"
                              description: "Output types that you would like the model to generate. Most models are capable of generating text, which is the default: [\"text\"]. The gpt-4o-audio-preview model can also be used to generate audio. To request that this model generate both text and audio responses, you can use: [\"text\", \"audio\"]."
                            guardrails:
                              type: "array"
                              items:
                                type: "object"
                                properties:
                                  id:
                                    anyOf:
                                      - type: "string"
                                        enum:
                                          - "orq_pii_detection"
                                          - "orq_sexual_moderation"
                                          - "orq_harmful_moderation"
                                        description: "The key of the guardrail."
                                      - type: "string"
                                        description: "Unique key or identifier of the evaluator"
                                  execute_on:
                                    type: "string"
                                    enum:
                                      - "input"
                                      - "output"
                                    description: "Determines whether the guardrail runs on the input (user message) or output (model response)."
                                required:
                                  - "id"
                                  - "execute_on"
                              description: "A list of guardrails to apply to the request."
                            fallbacks:
                              type: "array"
                              items:
                                type: "object"
                                properties:
                                  model:
                                    type: "string"
                                    description: "Fallback model identifier"
                                    example: "openai/gpt-4o-mini"
                                required:
                                  - "model"
                              description: "Array of fallback models to use if primary model fails"
                            cache:
                              type: "object"
                              properties:
                                ttl:
                                  type: "number"
                                  minimum: 1
                                  maximum: 259200
                                  default: 1800
                                  description: "Time to live for cached responses in seconds. Maximum 259200 seconds (3 days)."
                                  example: 3600
                                type:
                                  type: "string"
                                  enum:
                                    - "exact_match"
                              required:
                                - "type"
                              description: "Cache configuration for the request."
                            load_balancer:
                              oneOf:
                                - type: "object"
                                  properties:
                                    type:
                                      type: "string"
                                      enum:
                                        - "weight_based"
                                    models:
                                      type: "array"
                                      items:
                                        type: "object"
                                        properties:
                                          model:
