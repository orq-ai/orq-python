                        - "integer"
                        - "null"
                      minimum: 1
                      description: "How many chat completion choices to generate for each input message. Note that you will be charged based on the number of generated tokens across all of the choices. Keep n as 1 to minimize costs."
                    presence_penalty:
                      type:
                        - "number"
                        - "null"
                      description: "Number between -2.0 and 2.0. Positive values penalize new tokens based on whether they appear in the text so far, increasing the model's likelihood to talk about new topics."
                    response_format:
                      oneOf:
                        - type: "object"
                          properties:
                            type:
                              type: "string"
                              enum:
                                - "text"
                          required:
                            - "type"
                          title: "Text"
                          description: "\n\nDefault response format. Used to generate text responses"
                        - type: "object"
                          properties:
                            type:
                              type: "string"
                              enum:
                                - "json_object"
                          required:
                            - "type"
                          title: "JSON object"
                          description: "\n\nJSON object response format. An older method of generating JSON responses. Using `json_schema` is recommended for models that support it. Note that the model will not generate JSON without a system or user message instructing it to do so."
                        - type: "object"
                          properties:
                            type:
                              type: "string"
                              enum:
                                - "json_schema"
                            json_schema:
                              type: "object"
                              properties:
                                description:
                                  type: "string"
                                  description: "A description of what the response format is for, used by the model to determine how to respond in the format."
                                name:
                                  type: "string"
                                  description: "The name of the response format. Must be a-z, A-Z, 0-9, or contain underscores and dashes, with a maximum length of 64."
                                schema:
                                  description: "The schema for the response format, described as a JSON Schema object."
                                strict:
                                  type: "boolean"
                                  default: false
                                  description: "Whether to enable strict schema adherence when generating the output. If set to true, the model will always follow the exact schema defined in the schema field. Only a subset of JSON Schema is supported when strict is true."
                              required:
                                - "name"
                          required:
                            - "type"
                            - "json_schema"
                          title: "JSON schema"
                          description: "\n\nJSON Schema response format. Used to generate structured JSON responses"
                      description: "An object specifying the format that the model must output"
                    reasoning_effort:
                      type: "string"
                      enum:
                        - "none"
                        - "minimal"
                        - "low"
                        - "medium"
                        - "high"
                        - "xhigh"
                      description: "Constrains effort on reasoning for [reasoning models](https://platform.openai.com/docs/guides/reasoning). Currently supported values are `none`, `minimal`, `low`, `medium`, `high`, and `xhigh`. Reducing reasoning effort can result in faster responses and fewer tokens used on reasoning in a response.\n\n- `gpt-5.1` defaults to `none`, which does not perform reasoning. The supported reasoning values for `gpt-5.1` are `none`, `low`, `medium`, and `high`. Tool calls are supported for all reasoning values in gpt-5.1.\n- All models before `gpt-5.1` default to `medium` reasoning effort, and do not support `none`.\n- The `gpt-5-pro` model defaults to (and only supports) `high` reasoning effort.\n- `xhigh` is currently only supported for `gpt-5.1-codex-max`.\n\nAny of \"none\", \"minimal\", \"low\", \"medium\", \"high\", \"xhigh\"."
                    verbosity:
                      type: "string"
                      description: "Adjusts response verbosity. Lower levels yield shorter answers."
                    seed:
                      type:
                        - "number"
                        - "null"
                      description: "If specified, our system will make a best effort to sample deterministically, such that repeated requests with the same seed and parameters should return the same result."
                    stop:
                      anyOf:
                        - type: "string"
                        - type: "array"
                          items:
                            type: "string"
                          maxItems: 4
                        - type: "null"
                      description: "Up to 4 sequences where the API will stop generating further tokens."
                    stream_options:
                      type:
                        - "object"
                        - "null"
                      properties:
                        include_usage:
                          type: "boolean"
                          description: "If set, an additional chunk will be streamed before the data: [DONE] message. The usage field on this chunk shows the token usage statistics for the entire request, and the choices field will always be an empty array. All other chunks will also include a usage field, but with a null value."
                      description: "Options for streaming response. Only set this when you set stream: true."
                    thinking:
                      oneOf:
                        - $ref: "#/components/schemas/ThinkingConfigDisabledSchema"
                        - $ref: "#/components/schemas/ThinkingConfigEnabledSchema"
                        - $ref: "#/components/schemas/ThinkingConfigAdaptiveSchema"
                      discriminator:
                        propertyName: "type"
                        mapping:
                          disabled: "#/components/schemas/ThinkingConfigDisabledSchema"
                          enabled: "#/components/schemas/ThinkingConfigEnabledSchema"
                          adaptive: "#/components/schemas/ThinkingConfigAdaptiveSchema"
                    temperature:
                      type:
                        - "number"
                        - "null"
                      minimum: 0
                      maximum: 2
                      description: "What sampling temperature to use, between 0 and 2. Higher values like 0.8 will make the output more random, while lower values like 0.2 will make it more focused and deterministic."
                    top_p:
                      type:
                        - "number"
                        - "null"
                      minimum: 0
                      maximum: 1
                      description: "An alternative to sampling with temperature, called nucleus sampling, where the model considers the results of the tokens with top_p probability mass. "
                    top_k:
                      type:
                        - "number"
                        - "null"
                      description: "Limits the model to consider only the top k most likely tokens at each step."
                    tool_choice:
                      anyOf:
                        - type: "string"
                          enum:
                            - "none"
                            - "auto"
                            - "required"
                        - type: "object"
                          properties:
                            type:
                              type: "string"
                              enum:
                                - "function"
                              description: "The type of the tool. Currently, only function is supported."
                            function:
                              type: "object"
                              properties:
                                name:
                                  type: "string"
                                  description: "The name of the function to call."
                              required:
                                - "name"
                          required:
                            - "function"
                      description: "Controls which (if any) tool is called by the model."
                    parallel_tool_calls:
                      type: "boolean"
                      description: "Whether to enable parallel function calling during tool use."
                    modalities:
                      type:
                        - "array"
                        - "null"
                      items:
                        type: "string"
                        enum:
                          - "text"
                          - "audio"
                      description: "Output types that you would like the model to generate. Most models are capable of generating text, which is the default: [\"text\"]. The gpt-4o-audio-preview model can also be used to generate audio. To request that this model generate both text and audio responses, you can use: [\"text\", \"audio\"]."
                    guardrails:
                      type: "array"
                      items:
                        type: "object"
                        properties:
                          id:
                            anyOf:
                              - type: "string"
                                enum:
                                  - "orq_pii_detection"
                                  - "orq_sexual_moderation"
                                  - "orq_harmful_moderation"
                                description: "The key of the guardrail."
                              - type: "string"
                                description: "Unique key or identifier of the evaluator"
                          execute_on:
                            type: "string"
                            enum:
                              - "input"
                              - "output"
                            description: "Determines whether the guardrail runs on the input (user message) or output (model response)."
                        required:
                          - "id"
                          - "execute_on"
                      description: "A list of guardrails to apply to the request."
                    fallbacks:
                      type: "array"
                      items:
                        type: "object"
                        properties:
                          model:
                            type: "string"
                            description: "Fallback model identifier"
                            example: "openai/gpt-4o-mini"
                        required:
                          - "model"
                      description: "Array of fallback models to use if primary model fails"
                    retry:
                      type: "object"
                      properties:
                        count:
                          type: "number"
                          minimum: 1
                          maximum: 5
                          default: 3
                          description: "Number of retry attempts (1-5)"
                          example: 3
                        on_codes:
                          type: "array"
                          items:
                            type: "number"
                            minimum: 100
                            maximum: 599
                          minItems: 1
                          default:
                            - 429
                          description: "HTTP status codes that trigger retry logic"
                          example:
                            - 429
                            - 500
                            - 502
                            - 503
                            - 504
                      description: "Retry configuration for the request"
                    cache:
                      type: "object"
                      properties:
                        ttl:
                          type: "number"
                          minimum: 1
                          maximum: 259200
                          default: 1800
                          description: "Time to live for cached responses in seconds. Maximum 259200 seconds (3 days)."
                          example: 3600
                        type:
                          type: "string"
                          enum:
                            - "exact_match"
                      required:
                        - "type"
                      description: "Cache configuration for the request."
                    load_balancer:
                      oneOf:
                        - type: "object"
                          properties:
                            type:
                              type: "string"
                              enum:
                                - "weight_based"
                            models:
                              type: "array"
                              items:
                                type: "object"
                                properties:
                                  model:
                                    type: "string"
                                    description: "Model identifier for load balancing"
                                    example: "openai/gpt-4o"
                                  weight:
                                    type: "number"
                                    minimum: 0.001
                                    maximum: 1
                                    default: 0.5
                                    description: "Weight assigned to this model for load balancing"
                                    example: 0.7
                                required:
                                  - "model"
                          required:
                            - "type"
                            - "models"
                      description: "Load balancer configuration for the request."
                      example:
                        type: "weight_based"
                        models:
                          - model: "openai/gpt-4o"
                            weight: 0.7
                          - model: "anthropic/claude-3-5-sonnet"
                            weight: 0.3
                    timeout:
                      type: "object"
                      properties:
                        call_timeout:
                          type: "number"
                          minimum: 1
                          description: "Timeout value in milliseconds"
                          example: 30000
                      required:
                        - "call_timeout"
                      description: "Timeout configuration to apply to the request. If the request exceeds the timeout, it will be retried or fallback to the next model if configured."
                  required:
                    - "messages"
                  title: "PromptInput"
                  description: "Prompt configuration with model and messages."
                  example:
                    model: "openai/gpt-4o"
                    messages:
                      - role: "system"
                        content: "You are a helpful assistant"
                      - role: "user"
                        content: "What is the weather today?"
                    temperature: 0.7
                    max_tokens: 1000
                path:
                  type: "string"
                  description: "Entity storage path in the format: `project/folder/subfolder/...`\n\nThe first element identifies the project, followed by nested folders (auto-created as needed).\n\nWith project-based API keys, the first element is treated as a folder name, as the project is predetermined by the API key."
                  example: "Default"
              required:
                - "display_name"
                - "prompt"
                - "path"
      responses:
        "200":
          description: "Prompt created."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  _id:
                    type: "string"
                  type:
                    type: "string"
                    enum:
                      - "prompt"
                  owner:
                    type: "string"
                  domain_id:
                    type: "string"
                    format: "uuid"
                  created:
                    type: "string"
                  updated:
                    type: "string"
                  created_by_id:
                    type:
                      - "string"
                      - "null"
                    format: "uuid"
                  updated_by_id:
                    type:
                      - "string"
                      - "null"
                    format: "uuid"
                  display_name:
                    type: "string"
                    maxLength: 128
                    description: "The prompt’s name, meant to be displayable in the UI."
                  description:
                    type:
                      - "string"
                      - "null"
                    description: "The prompt’s description, meant to be displayable in the UI. Use this field to optionally store a long form explanation of the prompt for your own purpose"
                  prompt_config:
                    type: "object"
                    properties:
                      stream:
                        type: "boolean"
                      model:
                        type:
                          - "string"
                          - "null"
                      model_db_id:
                        type:
                          - "string"
                          - "null"
                        format: "uuid"
                        pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
                        readOnly: true
                        description: "The id of the resource"
                      model_type:
                        type:
                          - "string"
                          - "null"
                        enum:
                          - "chat"
                          - "completion"
                          - "embedding"
                          - "image"
                          - "tts"
                          - "stt"
                          - "rerank"
                          - "ocr"
                          - "moderation"
                          - "vision"
                          - null
                        description: "The modality of the model"
                      model_parameters:
                        type: "object"
                        properties:
                          temperature:
                            type: "number"
                            description: "Only supported on `chat` and `completion` models."
                          maxTokens:
                            type: "number"
                            description: "Only supported on `chat` and `completion` models."
                          topK:
                            type: "number"
                            description: "Only supported on `chat` and `completion` models."
                          topP:
                            type: "number"
                            description: "Only supported on `chat` and `completion` models."
                          frequencyPenalty:
                            type: "number"
                            description: "Only supported on `chat` and `completion` models."
                          presencePenalty:
                            type: "number"
                            description: "Only supported on `chat` and `completion` models."
                          numImages:
                            type: "number"
                            description: "Only supported on `image` models."
                          seed:
                            type: "number"
                            description: "Best effort deterministic seed for the model. Currently only OpenAI models support these"
                          format:
                            type: "string"
                            enum:
                              - "url"
                              - "b64_json"
                              - "text"
                              - "json_object"
                            description: "Only supported on `image` models."
                          dimensions:
                            type: "string"
                            description: "Only supported on `image` models."
                          quality:
                            type: "string"
                            description: "Only supported on `image` models."
                          style:
                            type: "string"
                            description: "Only supported on `image` models."
                          responseFormat:
                            anyOf:
                              - type: "object"
                                properties:
                                  type:
                                    type: "string"
                                    enum:
                                      - "json_schema"
                                  display_name:
                                    type: "string"
                                  json_schema:
                                    type: "object"
                                    properties:
                                      name:
                                        type: "string"
                                      description:
                                        type: "string"
                                      strict:
                                        type: "boolean"
                                      schema:
                                        type: "object"
                                        additionalProperties: {}
                                    required:
                                      - "name"
                                      - "schema"
                                required:
                                  - "type"
                                  - "json_schema"
                              - type: "object"
                                properties:
                                  type:
                                    type: "string"
                                    enum:
                                      - "json_object"
                                required:
                                  - "type"
                              - type: "object"
                                properties:
                                  type:
                                    type: "string"
                                    enum:
                                      - "text"
                                required:
                                  - "type"
                              - type: "string"
                                enum:
                                  - "mp3"
                                  - "opus"
                                  - "aac"
                                  - "flac"
                                  - "wav"
                                  - "pcm"
                              - type: "string"
                                enum:
                                  - "url"
                                  - "base64_json"
                              - type: "string"
                                enum:
                                  - "json"
                                  - "text"
                                  - "srt"
                                  - "verbose_json"
                                  - "vtt"
                              - type: "null"
                            description: "An object specifying the format that the model must output. \n\n Setting to `{ \"type\": \"json_schema\", \"json_schema\": {...} }` enables Structured Outputs which ensures the model will match your supplied JSON schema \n\n Setting to `{ \"type\": \"json_object\" }` enables JSON mode, which ensures the message the model generates is valid JSON.\n\nImportant: when using JSON mode, you must also instruct the model to produce JSON yourself via a system or user message. Without this, the model may generate an unending stream of whitespace until the generation reaches the token limit, resulting in a long-running and seemingly \"stuck\" request. Also note that the message content may be partially cut off if finish_reason=\"length\", which indicates the generation exceeded max_tokens or the conversation exceeded the max context length."
                          photoRealVersion:
                            type: "string"
                            enum:
                              - "v1"
                              - "v2"
                            description: "The version of photoReal to use. Must be v1 or v2. Only available for `leonardoai` provider"
                          encoding_format:
                            type: "string"
                            enum:
                              - "float"
                              - "base64"
                            description: "The format to return the embeddings"
                          reasoningEffort:
                            type: "string"
                            enum:
                              - "none"
                              - "disable"
                              - "minimal"
                              - "low"
                              - "medium"
                              - "high"
                            description: "Constrains effort on reasoning for reasoning models. Reducing reasoning effort can result in faster responses and fewer tokens used on reasoning in a response."
                          budgetTokens:
                            type: "number"
                            description: "Gives the model enhanced reasoning capabilities for complex tasks. A value of 0 disables thinking. The minimum budget tokens for thinking are 1024. The Budget Tokens should never exceed the Max Tokens parameter. Only supported by `Anthropic` "
                          verbosity:
                            type: "string"
                            enum:
                              - "low"
                              - "medium"
                              - "high"
                            description: "Controls the verbosity of the model output."
                          thinkingLevel:
                            type: "string"
                            enum:
                              - "low"
                              - "high"
                            description: "The level of thinking to use for the model. Only supported by `Google AI`"
                        description: "Model Parameters: Not all parameters apply to every model"
                      provider:
                        type:
                          - "string"
                          - "null"
                        enum:
                          - "openai"
                          - "groq"
                          - "cohere"
                          - "azure"
                          - "aws"
                          - "google"
                          - "google-ai"
                          - "huggingface"
                          - "togetherai"
                          - "perplexity"
                          - "anthropic"
                          - "leonardoai"
                          - "fal"
                          - "nvidia"
                          - "jina"
                          - "elevenlabs"
                          - "litellm"
                          - "cerebras"
                          - "openailike"
                          - "bytedance"
                          - "mistral"
                          - "deepseek"
                          - "contextualai"
                          - "moonshotai"
                          - "zai"
                          - "minimax"
                          - "xai"
                          - "alibaba"
                          - "tensorix"
                          - "scaleway"
                          - "hcompany"
                          - "inceptron"
                          - "slack"
                          - "orq"
                          - null
                      integration_id:
                        anyOf:
                          - type: "string"
                            format: "uuid"
                            pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
                            readOnly: true
                            description: "The id of the resource"
                          - type: "string"
                            format: "ulid"
                            pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
                            readOnly: true
                            description: "The id of the resource"
                          - type: "null"
                        description: "The ID of the integration to use"
                      version:
                        type: "string"
                      messages:
                        type: "array"
                        items:
                          type: "object"
                          properties:
                            role:
                              type: "string"
                              enum:
                                - "system"
                                - "developer"
                                - "assistant"
                                - "user"
                                - "exception"
                                - "tool"
                                - "prompt"
                                - "correction"
                                - "expected_output"
                              description: "The role of the prompt message"
                            content:
                              anyOf:
                                - type: "string"
                                - type: "array"
                                  items:
                                    oneOf:
                                      - type: "object"
                                        properties:
                                          type:
                                            type: "string"
                                            enum:
                                              - "text"
                                          text:
                                            type: "string"
                                        required:
                                          - "type"
                                          - "text"
                                        description: "Text content part of a prompt message"
                                      - type: "object"
                                        properties:
                                          type:
                                            type: "string"
                                            enum:
                                              - "image_url"
                                          image_url:
                                            type: "object"
                                            properties:
                                              id:
                                                type: "string"
                                                format: "ulid"
                                                pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
                                                readOnly: true
                                                description: "The orq.ai id of the image"
                                              url:
                                                type: "string"
                                                description: "Either a URL of the image or the base64 encoded data URI."
                                                examples:
                                                  - "https://picsum.photos/id/1/200/300"
                                                  - "data:image/jpeg;base64,"
                                              detail:
                                                type: "string"
                                                description: "Specifies the detail level of the image. Currently only supported with OpenAI models"
                                            required:
                                              - "url"
                                        required:
                                          - "type"
                                          - "image_url"
                                        description: "The image part of the prompt message. Only supported with vision models."
                                      - type: "object"
                                        properties:
                                          type:
                                            type: "string"
                                            enum:
                                              - "file"
                                            description: "The type of the content part. Always `file`."
                                          file:
                                            type: "object"
                                            properties:
                                              file_data:
                                                type: "string"
                                                description: "The file data as a data URI string in the format 'data:<mime-type>;base64,<base64-encoded-data>'. Example: 'data:image/png;base64,iVBORw0KGgoAAAANS...'"
                                              uri:
                                                type: "string"
                                                description: "URL to the file. Only supported by Anthropic Claude models for PDF files."
                                              mimeType:
                                                type: "string"
                                                description: "MIME type of the file (e.g., application/pdf, image/png)"
                                              filename:
                                                type: "string"
                                                description: "The name of the file, used when passing the file to the model as a string."
                                        required:
                                          - "type"
                                          - "file"
                                - type: "null"
                              description: "The contents of the user message. Either the text content of the message or an array of content parts with a defined type, each can be of type `text` or `image_url` when passing in images. You can pass multiple images by adding multiple `image_url` content parts. Can be null for tool messages in certain scenarios."
                            tool_calls:
                              type: "array"
                              items:
                                type: "object"
                                properties:
                                  id:
                                    type: "string"
                                  index:
                                    type: "number"
                                  type:
                                    type: "string"
                                    enum:
                                      - "function"
                                  function:
                                    type: "object"
                                    properties:
                                      name:
                                        type: "string"
                                      arguments:
                                        type: "string"
                                        description: "JSON string arguments for the functions"
                                    required:
                                      - "name"
                                      - "arguments"
                                required:
                                  - "type"
                                  - "function"
                            tool_call_id:
                              type:
                                - "string"
                                - "null"
                          required:
                            - "role"
                            - "content"
                    required:
                      - "messages"
                    deprecated: true
                    description: "[DEPRECATED] Use the `prompt` property instead. A list of messages compatible with the openAI schema."
                  prompt:
                    type: "object"
                    properties:
                      name:
                        type: "string"
                        description: "The name to display on the trace. If not specified, the default system name will be used."
                      audio:
                        type:
                          - "object"
                          - "null"
                        properties:
                          voice:
                            type: "string"
                            enum:
                              - "alloy"
                              - "echo"
                              - "fable"
                              - "onyx"
                              - "nova"
                              - "shimmer"
                            description: "The voice the model uses to respond. Supported voices are alloy, echo, fable, onyx, nova, and shimmer."
                          format:
                            type: "string"
                            enum:
                              - "wav"
                              - "mp3"
                              - "flac"
                              - "opus"
                              - "pcm16"
                            description: "Specifies the output audio format. Must be one of wav, mp3, flac, opus, or pcm16."
                        required:
                          - "voice"
                          - "format"
                        description: "Parameters for audio output. Required when audio output is requested with modalities: [\"audio\"]. Learn more."
                      frequency_penalty:
                        type:
                          - "number"
                          - "null"
                        description: "Number between -2.0 and 2.0. Positive values penalize new tokens based on their existing frequency in the text so far, decreasing the model's likelihood to repeat the same line verbatim."
                      max_tokens:
                        type:
                          - "integer"
                          - "null"
                        description: "`[Deprecated]`. The maximum number of tokens that can be generated in the chat completion. This value can be used to control costs for text generated via API. \n\n This value is now `deprecated` in favor of `max_completion_tokens`, and is not compatible with o1 series models."
                      max_completion_tokens:
                        type:
                          - "integer"
                          - "null"
                        exclusiveMinimum: 0
                        description: "An upper bound for the number of tokens that can be generated for a completion, including visible output tokens and reasoning tokens"
                      logprobs:
                        type:
                          - "boolean"
                          - "null"
                        description: "Whether to return log probabilities of the output tokens or not. If true, returns the log probabilities of each output token returned in the content of message."
                      top_logprobs:
                        type:
                          - "integer"
                          - "null"
                        minimum: 0
                        maximum: 20
                        description: "An integer between 0 and 20 specifying the number of most likely tokens to return at each token position, each with an associated log probability. logprobs must be set to true if this parameter is used."
                      n:
                        type:
                          - "integer"
                          - "null"
                        minimum: 1
                        description: "How many chat completion choices to generate for each input message. Note that you will be charged based on the number of generated tokens across all of the choices. Keep n as 1 to minimize costs."
                      presence_penalty:
                        type:
                          - "number"
                          - "null"
                        description: "Number between -2.0 and 2.0. Positive values penalize new tokens based on whether they appear in the text so far, increasing the model's likelihood to talk about new topics."
                      response_format:
                        oneOf:
                          - type: "object"
                            properties:
                              type:
                                type: "string"
                                enum:
                                  - "text"
                            required:
                              - "type"
                            title: "Text"
                            description: "\n\nDefault response format. Used to generate text responses"
                          - type: "object"
                            properties:
                              type:
                                type: "string"
                                enum:
                                  - "json_object"
                            required:
                              - "type"
                            title: "JSON object"
                            description: "\n\nJSON object response format. An older method of generating JSON responses. Using `json_schema` is recommended for models that support it. Note that the model will not generate JSON without a system or user message instructing it to do so."
                          - type: "object"
                            properties:
                              type:
                                type: "string"
                                enum:
                                  - "json_schema"
                              json_schema:
                                type: "object"
                                properties:
                                  description:
                                    type: "string"
                                    description: "A description of what the response format is for, used by the model to determine how to respond in the format."
                                  name:
                                    type: "string"
                                    description: "The name of the response format. Must be a-z, A-Z, 0-9, or contain underscores and dashes, with a maximum length of 64."
                                  schema:
                                    description: "The schema for the response format, described as a JSON Schema object."
                                  strict:
                                    type: "boolean"
                                    default: false
                                    description: "Whether to enable strict schema adherence when generating the output. If set to true, the model will always follow the exact schema defined in the schema field. Only a subset of JSON Schema is supported when strict is true."
                                required:
                                  - "name"
                            required:
                              - "type"
                              - "json_schema"
                            title: "JSON schema"
                            description: "\n\nJSON Schema response format. Used to generate structured JSON responses"
                        description: "An object specifying the format that the model must output"
                      reasoning_effort:
                        type: "string"
                        enum:
                          - "none"
                          - "minimal"
                          - "low"
                          - "medium"
                          - "high"
                          - "xhigh"
                        description: "Constrains effort on reasoning for [reasoning models](https://platform.openai.com/docs/guides/reasoning). Currently supported values are `none`, `minimal`, `low`, `medium`, `high`, and `xhigh`. Reducing reasoning effort can result in faster responses and fewer tokens used on reasoning in a response.\n\n- `gpt-5.1` defaults to `none`, which does not perform reasoning. The supported reasoning values for `gpt-5.1` are `none`, `low`, `medium`, and `high`. Tool calls are supported for all reasoning values in gpt-5.1.\n- All models before `gpt-5.1` default to `medium` reasoning effort, and do not support `none`.\n- The `gpt-5-pro` model defaults to (and only supports) `high` reasoning effort.\n- `xhigh` is currently only supported for `gpt-5.1-codex-max`.\n\nAny of \"none\", \"minimal\", \"low\", \"medium\", \"high\", \"xhigh\"."
                      verbosity:
                        type: "string"
                        description: "Adjusts response verbosity. Lower levels yield shorter answers."
                      seed:
                        type:
                          - "number"
                          - "null"
                        description: "If specified, our system will make a best effort to sample deterministically, such that repeated requests with the same seed and parameters should return the same result."
                      stop:
                        anyOf:
                          - type: "string"
                          - type: "array"
                            items:
                              type: "string"
                            maxItems: 4
                          - type: "null"
                        description: "Up to 4 sequences where the API will stop generating further tokens."
                      stream_options:
                        type:
                          - "object"
                          - "null"
                        properties:
                          include_usage:
                            type: "boolean"
                            description: "If set, an additional chunk will be streamed before the data: [DONE] message. The usage field on this chunk shows the token usage statistics for the entire request, and the choices field will always be an empty array. All other chunks will also include a usage field, but with a null value."
                        description: "Options for streaming response. Only set this when you set stream: true."
                      thinking:
                        oneOf:
                          - $ref: "#/components/schemas/ThinkingConfigDisabledSchema"
                          - $ref: "#/components/schemas/ThinkingConfigEnabledSchema"
                          - $ref: "#/components/schemas/ThinkingConfigAdaptiveSchema"
                        discriminator:
                          propertyName: "type"
                          mapping:
                            disabled: "#/components/schemas/ThinkingConfigDisabledSchema"
                            enabled: "#/components/schemas/ThinkingConfigEnabledSchema"
                            adaptive: "#/components/schemas/ThinkingConfigAdaptiveSchema"
                      temperature:
                        type:
                          - "number"
                          - "null"
                        minimum: 0
                        maximum: 2
                        description: "What sampling temperature to use, between 0 and 2. Higher values like 0.8 will make the output more random, while lower values like 0.2 will make it more focused and deterministic."
                      top_p:
                        type:
                          - "number"
                          - "null"
                        minimum: 0
                        maximum: 1
                        description: "An alternative to sampling with temperature, called nucleus sampling, where the model considers the results of the tokens with top_p probability mass. "
                      top_k:
                        type:
                          - "number"
                          - "null"
                        description: "Limits the model to consider only the top k most likely tokens at each step."
                      tool_choice:
                        anyOf:
                          - type: "string"
                            enum:
                              - "none"
                              - "auto"
                              - "required"
                          - type: "object"
                            properties:
                              type:
                                type: "string"
                                enum:
                                  - "function"
                                description: "The type of the tool. Currently, only function is supported."
                              function:
                                type: "object"
                                properties:
                                  name:
                                    type: "string"
                                    description: "The name of the function to call."
                                required:
                                  - "name"
                            required:
                              - "function"
                        description: "Controls which (if any) tool is called by the model."
                      parallel_tool_calls:
                        type: "boolean"
                        description: "Whether to enable parallel function calling during tool use."
                      modalities:
                        type:
                          - "array"
                          - "null"
                        items:
                          type: "string"
                          enum:
                            - "text"
                            - "audio"
                        description: "Output types that you would like the model to generate. Most models are capable of generating text, which is the default: [\"text\"]. The gpt-4o-audio-preview model can also be used to generate audio. To request that this model generate both text and audio responses, you can use: [\"text\", \"audio\"]."
                      guardrails:
                        type: "array"
                        items:
                          type: "object"
                          properties:
                            id:
                              anyOf:
                                - type: "string"
                                  enum:
                                    - "orq_pii_detection"
                                    - "orq_sexual_moderation"
                                    - "orq_harmful_moderation"
                                  description: "The key of the guardrail."
                                - type: "string"
                                  description: "Unique key or identifier of the evaluator"
                            execute_on:
                              type: "string"
                              enum:
                                - "input"
                                - "output"
                              description: "Determines whether the guardrail runs on the input (user message) or output (model response)."
                          required:
                            - "id"
                            - "execute_on"
                        description: "A list of guardrails to apply to the request."
                      fallbacks:
                        type: "array"
                        items:
                          type: "object"
                          properties:
                            model:
                              type: "string"
                              description: "Fallback model identifier"
                              example: "openai/gpt-4o-mini"
                          required:
                            - "model"
                        description: "Array of fallback models to use if primary model fails"
                      retry:
                        type: "object"
                        properties:
                          count:
                            type: "number"
                            minimum: 1
                            maximum: 5
                            default: 3
                            description: "Number of retry attempts (1-5)"
                            example: 3
                          on_codes:
                            type: "array"
                            items:
                              type: "number"
                              minimum: 100
                              maximum: 599
                            minItems: 1
                            default:
                              - 429
                            description: "HTTP status codes that trigger retry logic"
                            example:
                              - 429
                              - 500
                              - 502
                              - 503
                              - 504
                        description: "Retry configuration for the request"
                      cache:
                        type: "object"
                        properties:
                          ttl:
                            type: "number"
                            minimum: 1
                            maximum: 259200
                            default: 1800
                            description: "Time to live for cached responses in seconds. Maximum 259200 seconds (3 days)."
                            example: 3600
                          type:
                            type: "string"
                            enum:
                              - "exact_match"
                        required:
                          - "type"
                        description: "Cache configuration for the request."
                      load_balancer:
                        oneOf:
                          - type: "object"
                            properties:
                              type:
                                type: "string"
                                enum:
                                  - "weight_based"
                              models:
                                type: "array"
                                items:
                                  type: "object"
                                  properties:
                                    model:
                                      type: "string"
                                      description: "Model identifier for load balancing"
                                      example: "openai/gpt-4o"
                                    weight:
                                      type: "number"
                                      minimum: 0.001
                                      maximum: 1
                                      default: 0.5
                                      description: "Weight assigned to this model for load balancing"
                                      example: 0.7
                                  required:
                                    - "model"
                            required:
                              - "type"
                              - "models"
                        description: "Load balancer configuration for the request."
                        example:
                          type: "weight_based"
                          models:
                            - model: "openai/gpt-4o"
                              weight: 0.7
                            - model: "anthropic/claude-3-5-sonnet"
                              weight: 0.3
                      timeout:
                        type: "object"
                        properties:
                          call_timeout:
                            type: "number"
                            minimum: 1
                            description: "Timeout value in milliseconds"
                            example: 30000
                        required:
                          - "call_timeout"
                        description: "Timeout configuration to apply to the request. If the request exceeds the timeout, it will be retried or fallback to the next model if configured."
                      messages:
                        type: "array"
                        items:
                          oneOf:
                            - type: "object"
                              properties:
                                role:
                                  type: "string"
                                  enum:
                                    - "system"
                                  description: "The role of the messages author, in this case `system`."
                                content:
                                  anyOf:
                                    - type: "string"
                                      description: "The contents of the system message."
                                    - type: "array"
                                      items:
                                        $ref: "#/components/schemas/TextContentPartSchema"
                                      minItems: 1
                                      description: "An array of content parts with a defined type. For system messages, only type `text` is supported."
                                  description: "The contents of the system message."
                                name:
                                  type: "string"
                                  description: "An optional name for the participant. Provides the model information to differentiate between participants of the same role."
                              required:
                                - "role"
                                - "content"
                              title: "System message"
                              description: "Developer-provided instructions that the model should follow, regardless of messages sent by the user."
                            - type: "object"
                              properties:
                                role:
                                  type: "string"
                                  enum:
                                    - "user"
                                  description: "The role of the messages author, in this case `user`."
                                name:
                                  type: "string"
                                  description: "An optional name for the participant. Provides the model information to differentiate between participants of the same role."
                                content:
                                  anyOf:
                                    - type: "string"
                                      description: "The text contents of the message."
                                    - type: "array"
                                      items:
                                        oneOf:
                                          - $ref: "#/components/schemas/TextContentPartSchema"
                                          - $ref: "#/components/schemas/ImageContentPartSchema"
                                          - $ref: "#/components/schemas/AudioContentPartSchema"
                                          - type: "object"
                                            properties:
                                              type:
                                                type: "string"
                                                enum:
                                                  - "file"
                                                description: "The type of the content part. Always `file`."
                                              cache_control:
                                                type: "object"
                                                properties:
                                                  type:
                                                    type: "string"
                                                    enum:
                                                      - "ephemeral"
                                                    description: "Create a cache control breakpoint at this content block. Accepts only the value \"ephemeral\"."
                                                  ttl:
                                                    type: "string"
                                                    enum:
                                                      - "5m"
                                                      - "1h"
                                                    default: "5m"
                                                    description: "The time-to-live for the cache control breakpoint. This may be one of the following values:\n\n- `5m`: 5 minutes\n- `1h`: 1 hour\n\nDefaults to `5m`. Only supported by `Anthropic` Claude models."
                                                required:
                                                  - "type"
                                              file:
                                                $ref: "#/components/schemas/FileContentPartSchema"
                                            required:
                                              - "type"
                                              - "file"
                                      description: "An array of content parts with a defined type. Supported options differ based on the model being used to generate the response. Can contain text, image, or audio inputs."
                                  description: "The contents of the user message."
                              required:
                                - "role"
                                - "content"
                              title: "User message"
                            - type: "object"
                              properties:
                                content:
                                  anyOf:
                                    - type: "string"
                                      description: "The contents of the assistant message."
                                    - type: "array"
                                      items:
                                        oneOf:
                                          - $ref: "#/components/schemas/TextContentPartSchema"
                                          - $ref: "#/components/schemas/RefusalPartSchema"
                                          - $ref: "#/components/schemas/ReasoningPartSchema"
                                          - $ref: "#/components/schemas/RedactedReasoningPartSchema"
                                        discriminator:
                                          propertyName: "type"
                                          mapping:
                                            text: "#/components/schemas/TextContentPartSchema"
                                            refusal: "#/components/schemas/RefusalPartSchema"
                                            reasoning: "#/components/schemas/ReasoningPartSchema"
                                            redacted_reasoning: "#/components/schemas/RedactedReasoningPartSchema"
                                      description: "An array of content parts with a defined type. Can be one or more of type `text`, or exactly one of type `refusal`."
                                    - type: "null"
                                  description: "The contents of the assistant message. Required unless `tool_calls` or `function_call` is specified."
                                refusal:
                                  type:
                                    - "string"
                                    - "null"
                                  description: "The refusal message by the assistant."
                                role:
                                  type: "string"
                                  enum:
                                    - "assistant"
                                  description: "The role of the messages author, in this case `assistant`."
                                name:
                                  type: "string"
                                  description: "An optional name for the participant. Provides the model information to differentiate between participants of the same role."
                                audio:
                                  type:
                                    - "object"
                                    - "null"
                                  properties:
                                    id:
                                      type: "string"
                                      description: "Unique identifier for a previous audio response from the model."
                                  required:
                                    - "id"
                                  description: "Data about a previous audio response from the model. "
                                tool_calls:
                                  type: "array"
                                  items:
                                    type: "object"
                                    properties:
                                      id:
                                        type: "string"
                                        description: "The ID of the tool call."
                                      type:
                                        type: "string"
                                        enum:
                                          - "function"
                                        description: "The type of the tool. Currently, only `function` is supported."
                                      function:
                                        type: "object"
                                        properties:
                                          name:
                                            type: "string"
                                            description: "The name of the function to call."
                                          arguments:
                                            type: "string"
                                            description: "The arguments to call the function with, as generated by the model in JSON format. Note that the model does not always generate valid JSON, and may hallucinate parameters not defined by your function schema. Validate the arguments in your code before calling your function."
                                      thought_signature:
                                        type: "string"
                                        description: "Encrypted representation of the model internal reasoning state during function calling. Required by Gemini 3 models when continuing a conversation after a tool call."
                                    required:
                                      - "id"
                                      - "type"
                                      - "function"
                                  description: "The tool calls generated by the model, such as function calls."
                              required:
                                - "role"
                              title: "Assistant message"
                            - type: "object"
                              properties:
                                role:
                                  type: "string"
                                  enum:
                                    - "tool"
                                  description: "The role of the messages author, in this case tool."
                                content:
                                  anyOf:
                                    - type: "string"
                                    - type: "array"
                                      items:
                                        oneOf:
                                          - $ref: "#/components/schemas/TextContentPartSchema"
                                        discriminator:
                                          propertyName: "type"
                                          mapping:
                                            text: "#/components/schemas/TextContentPartSchema"
                                  description: "The contents of the tool message."
                                tool_call_id:
                                  type:
                                    - "string"
                                    - "null"
                                  description: "Tool call that this message is responding to."
                                cache_control:
                                  type: "object"
                                  properties:
                                    type:
                                      type: "string"
                                      enum:
                                        - "ephemeral"
                                      description: "Create a cache control breakpoint at this content block. Accepts only the value \"ephemeral\"."
                                    ttl:
                                      type: "string"
                                      enum:
                                        - "5m"
                                        - "1h"
                                      default: "5m"
                                      description: "The time-to-live for the cache control breakpoint. This may be one of the following values:\n\n- `5m`: 5 minutes\n- `1h`: 1 hour\n\nDefaults to `5m`. Only supported by `Anthropic` Claude models."
                                  required:
                                    - "type"
                              required:
                                - "role"
                                - "content"
                                - "tool_call_id"
                              title: "Tool message"
                        description: "Array of messages that make up the conversation. Each message has a role (system, user, assistant, or tool) and content."
                      model:
                        type:
                          - "string"
                          - "null"
                        description: "Model ID used to generate the response, like `openai/gpt-4o` or `anthropic/claude-3-5-sonnet-20241022`. For private models, use format: `{workspaceKey}@{provider}/{model}`."
                        example: "openai/gpt-4o"
                      version:
                        type: "string"
                    title: "PromptField"
                    description: "Prompt configuration with model and messages. Use this instead of prompt_config."
                  metadata:
                    type: "object"
                    properties:
                      use_cases:
                        type: "array"
                        items:
                          type: "string"
                          enum:
                            - "Agents simulations"
                            - "Agents"
                            - "API interaction"
                            - "Autonomous Agents"
                            - "Chatbots"
                            - "Classification"
                            - "Code understanding"
                            - "Code writing"
                            - "Conversation"
                            - "Documents QA"
                            - "Evaluation"
                            - "Extraction"
                            - "Multi-modal"
                            - "Self-checking"
                            - "Sentiment analysis"
                            - "SQL"
                            - "Summarization"
                            - "Tagging"
                            - "Translation (document)"
                            - "Translation (sentences)"
                        description: "A list of use cases that the prompt is meant to be used for. Use this field to categorize the prompt for your own purpose"
                      language:
                        type:
                          - "string"
                          - "null"
                        enum:
                          - "Chinese"
                          - "Dutch"
                          - "English"
                          - "French"
                          - "German"
                          - "Russian"
                          - "Spanish"
                          - null
                        description: "The language that the prompt is written in. Use this field to categorize the prompt for your own purpose"
                    default:
                      language: "English"
                required:
                  - "_id"
                  - "type"
                  - "owner"
                  - "domain_id"
                  - "created"
                  - "updated"
                  - "display_name"
                  - "prompt"
                title: "Prompt"
                description: "A prompt entity with configuration, metadata, and versioning."
      security:
        - ApiKey: []
  /v2/prompts/{id}:
    get:
      tags:
        - "Prompts"
      x-speakeasy-group: "prompts"
      x-speakeasy-name-override: "retrieve"
      x-cli-group: "prompts"
      x-cli-name: "retrieve"
      operationId: "GetOnePrompt"
      summary: "Retrieve a prompt"
      description: "Retrieves a prompt object"
      parameters:
        - schema:
            type: "string"
            description: "Unique identifier of the prompt"
          required: true
          description: "Unique identifier of the prompt"
          name: "id"
          in: "path"
      responses:
        "200":
          description: "Prompt retrieved."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  _id:
                    type: "string"
                  type:
                    type: "string"
                    enum:
                      - "prompt"
                  owner:
                    type: "string"
                  domain_id:
                    type: "string"
                    format: "uuid"
                  created:
                    type: "string"
                  updated:
                    type: "string"
                  created_by_id:
                    type:
                      - "string"
                      - "null"
                    format: "uuid"
                  updated_by_id:
                    type:
                      - "string"
                      - "null"
                    format: "uuid"
                  display_name:
                    type: "string"
                    maxLength: 128
                    description: "The prompt’s name, meant to be displayable in the UI."
                  description:
                    type:
                      - "string"
                      - "null"
                    description: "The prompt’s description, meant to be displayable in the UI. Use this field to optionally store a long form explanation of the prompt for your own purpose"
                  prompt_config:
                    type: "object"
                    properties:
                      stream:
                        type: "boolean"
                      model:
                        type:
                          - "string"
                          - "null"
                      model_db_id:
                        type:
                          - "string"
                          - "null"
                        format: "uuid"
                        pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
                        readOnly: true
                        description: "The id of the resource"
                      model_type:
                        type:
                          - "string"
                          - "null"
                        enum:
                          - "chat"
                          - "completion"
                          - "embedding"
                          - "image"
                          - "tts"
                          - "stt"
                          - "rerank"
                          - "ocr"
                          - "moderation"
                          - "vision"
                          - null
                        description: "The modality of the model"
                      model_parameters:
                        type: "object"
                        properties:
                          temperature:
                            type: "number"
                            description: "Only supported on `chat` and `completion` models."
                          maxTokens:
                            type: "number"
                            description: "Only supported on `chat` and `completion` models."
                          topK:
                            type: "number"
                            description: "Only supported on `chat` and `completion` models."
                          topP:
                            type: "number"
                            description: "Only supported on `chat` and `completion` models."
                          frequencyPenalty:
                            type: "number"
                            description: "Only supported on `chat` and `completion` models."
                          presencePenalty:
                            type: "number"
                            description: "Only supported on `chat` and `completion` models."
                          numImages:
                            type: "number"
                            description: "Only supported on `image` models."
                          seed:
                            type: "number"
                            description: "Best effort deterministic seed for the model. Currently only OpenAI models support these"
                          format:
                            type: "string"
                            enum:
                              - "url"
                              - "b64_json"
                              - "text"
                              - "json_object"
                            description: "Only supported on `image` models."
                          dimensions:
                            type: "string"
                            description: "Only supported on `image` models."
                          quality:
                            type: "string"
                            description: "Only supported on `image` models."
                          style:
                            type: "string"
                            description: "Only supported on `image` models."
                          responseFormat:
                            anyOf:
                              - type: "object"
                                properties:
                                  type:
                                    type: "string"
                                    enum:
                                      - "json_schema"
                                  display_name:
                                    type: "string"
                                  json_schema:
                                    type: "object"
                                    properties:
                                      name:
                                        type: "string"
                                      description:
                                        type: "string"
                                      strict:
                                        type: "boolean"
                                      schema:
                                        type: "object"
                                        additionalProperties: {}
                                    required:
                                      - "name"
                                      - "schema"
                                required:
                                  - "type"
                                  - "json_schema"
                              - type: "object"
                                properties:
                                  type:
                                    type: "string"
                                    enum:
                                      - "json_object"
                                required:
                                  - "type"
                              - type: "object"
                                properties:
                                  type:
                                    type: "string"
                                    enum:
                                      - "text"
                                required:
                                  - "type"
                              - type: "string"
                                enum:
                                  - "mp3"
                                  - "opus"
                                  - "aac"
                                  - "flac"
                                  - "wav"
                                  - "pcm"
                              - type: "string"
                                enum:
                                  - "url"
                                  - "base64_json"
                              - type: "string"
                                enum:
                                  - "json"
                                  - "text"
                                  - "srt"
                                  - "verbose_json"
                                  - "vtt"
                              - type: "null"
                            description: "An object specifying the format that the model must output. \n\n Setting to `{ \"type\": \"json_schema\", \"json_schema\": {...} }` enables Structured Outputs which ensures the model will match your supplied JSON schema \n\n Setting to `{ \"type\": \"json_object\" }` enables JSON mode, which ensures the message the model generates is valid JSON.\n\nImportant: when using JSON mode, you must also instruct the model to produce JSON yourself via a system or user message. Without this, the model may generate an unending stream of whitespace until the generation reaches the token limit, resulting in a long-running and seemingly \"stuck\" request. Also note that the message content may be partially cut off if finish_reason=\"length\", which indicates the generation exceeded max_tokens or the conversation exceeded the max context length."
                          photoRealVersion:
                            type: "string"
                            enum:
                              - "v1"
                              - "v2"
                            description: "The version of photoReal to use. Must be v1 or v2. Only available for `leonardoai` provider"
                          encoding_format:
                            type: "string"
                            enum:
                              - "float"
                              - "base64"
                            description: "The format to return the embeddings"
                          reasoningEffort:
                            type: "string"
                            enum:
                              - "none"
                              - "disable"
                              - "minimal"
                              - "low"
                              - "medium"
                              - "high"
                            description: "Constrains effort on reasoning for reasoning models. Reducing reasoning effort can result in faster responses and fewer tokens used on reasoning in a response."
                          budgetTokens:
                            type: "number"
                            description: "Gives the model enhanced reasoning capabilities for complex tasks. A value of 0 disables thinking. The minimum budget tokens for thinking are 1024. The Budget Tokens should never exceed the Max Tokens parameter. Only supported by `Anthropic` "
                          verbosity:
                            type: "string"
                            enum:
                              - "low"
                              - "medium"
                              - "high"
                            description: "Controls the verbosity of the model output."
                          thinkingLevel:
                            type: "string"
                            enum:
                              - "low"
                              - "high"
                            description: "The level of thinking to use for the model. Only supported by `Google AI`"
                        description: "Model Parameters: Not all parameters apply to every model"
                      provider:
                        type:
                          - "string"
                          - "null"
                        enum:
                          - "openai"
                          - "groq"
                          - "cohere"
                          - "azure"
                          - "aws"
                          - "google"
                          - "google-ai"
                          - "huggingface"
                          - "togetherai"
                          - "perplexity"
                          - "anthropic"
                          - "leonardoai"
                          - "fal"
                          - "nvidia"
                          - "jina"
                          - "elevenlabs"
                          - "litellm"
                          - "cerebras"
                          - "openailike"
                          - "bytedance"
                          - "mistral"
                          - "deepseek"
                          - "contextualai"
                          - "moonshotai"
                          - "zai"
                          - "minimax"
                          - "xai"
                          - "alibaba"
                          - "tensorix"
                          - "scaleway"
                          - "hcompany"
                          - "inceptron"
                          - "slack"
