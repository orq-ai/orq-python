      x-cli-name: "create"
      x-speakeasy-ignore: false
      x-orq-gateway-group: "true"
      operationId: "createResponse"
      summary: "Create response"
      description: "Creates a model response for the given input."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: "object"
                  properties:
                    model:
                      type: "string"
                      description: "ID of the model to use. You can use the List models API to see all of your available models."
                    metadata:
                      type: "object"
                      additionalProperties:
                        type: "string"
                      description: "Developer-defined key-value pairs that will be included in response objects"
                    temperature:
                      type:
                        - "number"
                        - "null"
                      minimum: 0
                      maximum: 2
                      description: "What sampling temperature to use, between 0 and 2. Higher values like 0.8 will make the output more random, while lower values like 0.2 will make it more focused and deterministic."
                    top_p:
                      type:
                        - "number"
                        - "null"
                      minimum: 0
                      maximum: 1
                      description: "An alternative to sampling with temperature, called nucleus sampling, where the model considers the results of the tokens with top_p probability mass. So 0.1 means only the tokens comprising the top 10% probability mass are considered."
                    previous_response_id:
                      type:
                        - "string"
                        - "null"
                      description: "The ID of a previous response to continue the conversation from. The model will have access to the previous response context."
                    instructions:
                      type:
                        - "string"
                        - "null"
                      description: "Developer-provided instructions that the model should follow. Overwrites the default system message."
                    reasoning:
                      type:
                        - "object"
                        - "null"
                      properties:
                        effort:
                          type: "string"
                          enum:
                            - "none"
                            - "minimal"
                            - "low"
                            - "medium"
                            - "high"
                            - "xhigh"
                          description: "The effort level for reasoning"
                        summary:
                          type:
                            - "string"
                            - "null"
                          enum:
                            - "auto"
                            - "concise"
                            - "detailed"
                            - null
                          description: "The summary mode for reasoning output"
                      description: "Configuration for reasoning models"
                    thinking:
                      oneOf:
                        - $ref: "#/components/schemas/ThinkingConfigDisabledSchema"
                        - $ref: "#/components/schemas/ThinkingConfigEnabledSchema"
                        - $ref: "#/components/schemas/ThinkingConfigAdaptiveSchema"
                        - type: "null"
                      description: "Configuration for thinking mode. Use `adaptive` for models that support it (e.g. Claude Opus 4.6, Sonnet 4.6), or `enabled` with `budget_tokens` for manual control."
                    max_output_tokens:
                      type:
                        - "integer"
                        - "null"
                      description: "The maximum number of tokens that can be generated in the response"
                    text:
                      type:
                        - "object"
                        - "null"
                      properties:
                        format:
                          oneOf:
                            - type: "object"
                              properties:
                                type:
                                  type: "string"
                                  enum:
                                    - "text"
                                  description: "Plain text response format"
                              required:
                                - "type"
                            - type: "object"
                              properties:
                                type:
                                  type: "string"
                                  enum:
                                    - "json_object"
                                  description: "Ensures the response is a valid JSON object"
                              required:
                                - "type"
                            - type: "object"
                              properties:
                                type:
                                  type: "string"
                                  enum:
                                    - "json_schema"
                                  description: "Ensures the response matches a supplied JSON schema"
                                name:
                                  type: "string"
                                  description: "The name of the response format. Must be a-z, A-Z, 0-9, or contain underscores and dashes, with a maximum length of 64."
                                description:
                                  type: "string"
                                  description: "A description of what the response format is for, used by the model to determine how to respond in the format."
                                schema:
                                  type: "object"
                                  additionalProperties: {}
                                  description: "The JSON schema to validate the response against"
                                strict:
                                  type: "boolean"
                                  default: true
                                  description: "Whether to enable strict `schema` adherence when generating the output. If set to true, the model will always follow the exact schema defined in the schema field. Only a subset of JSON Schema is supported when `strict` is `true`"
                              required:
                                - "type"
                                - "name"
                                - "schema"
