                            title: "Function Tool"
                            description: "Calls custom function tools defined in the agent configuration. Must reference a pre-created function tool by key or id."
                          - type: "object"
                            properties:
                              type:
                                type: "string"
                                enum:
                                  - "json_schema"
                                default: "json_schema"
                                description: "JSON Schema tool type"
                              key:
                                type: "string"
                                description: "The key of the pre-created JSON Schema tool"
                              id:
                                type: "string"
                                description: "The ID of the pre-created JSON Schema tool"
                              requires_approval:
                                type: "boolean"
                                default: false
                                description: "Whether this tool requires approval before execution"
                            title: "JSON Schema Tool"
                            description: "Enforces structured output format using JSON Schema. Must reference a pre-created JSON Schema tool by key or id."
                          - type: "object"
                            properties:
                              type:
                                type: "string"
                                enum:
                                  - "mcp"
                                default: "mcp"
                                description: "MCP tool type"
                              key:
                                type: "string"
                                description: "The key of the parent MCP tool"
                              id:
                                type: "string"
                                description: "The ID of the parent MCP tool"
                              tool_id:
                                type: "string"
                                description: "The ID of the specific nested tool within the MCP server"
                              requires_approval:
                                type: "boolean"
                                default: false
                                description: "Whether this tool requires approval before execution"
                            required:
                              - "tool_id"
                            title: "MCP Tool"
                            description: "Executes tools from Model Context Protocol (MCP) servers. Specify the parent MCP tool using \"key\" or \"id\", and the specific nested tool using \"tool_id\"."
                            example:
                              type: "mcp"
                              id: "01KA84ND5J0SWQMA2Q8HY5WZZZ"
                              tool_id: "01KXYZ123456789"
                              requires_approval: false
                          - type: "object"
                            properties:
                              type:
                                type: "string"
                                pattern: "^[a-z][a-z0-9_-]*:.+$"
                                description: "Provider-prefixed tool type"
                              requires_approval:
                                type: "boolean"
                                description: "Whether this tool requires approval before execution"
                            required:
                              - "type"
                            title: "Provider Built-in Tool"
                            description: "Provider-specific built-in tools that are passed through to the provider. Must be prefixed with the provider name (e.g., openai:web_search, anthropic:web_search_20250305, google:google_search)."
                            example:
                              type: "openai:web_search"
                        description: "Tool configuration for agent create/update operations. Built-in tools only require a type, while custom tools (HTTP, Code, Function, JSON Schema, MCP) must reference pre-created tools by key or id. Provider-prefixed tools (e.g., openai:web_search) are passed through to the provider."
                        title: "Agent Tool Input (CRUD)"
                      default: []
                      description: "Tools available to the agent. Built-in tools only need a type, while custom tools (http, code, function) must reference pre-created tools by key or id."
                    evaluators:
                      type: "array"
                      items:
                        type: "object"
                        properties:
                          id:
                            type: "string"
                            description: "Unique key or identifier of the evaluator"
                          sample_rate:
                            type: "number"
                            minimum: 1
                            maximum: 100
                            default: 50
                            description: "The percentage of executions to evaluate with this evaluator (1-100). For example, a value of 50 means the evaluator will run on approximately half of the executions."
                          execute_on:
                            type: "string"
                            enum:
                              - "input"
                              - "output"
                            description: "Determines whether the evaluator runs on the agent input (user message) or output (agent response)."
                        required:
                          - "id"
                          - "execute_on"
                      title: "Agent evaluator configuration"
                      description: "Configuration for an evaluator applied to the agent"
                    guardrails:
                      type: "array"
                      items:
                        type: "object"
                        properties:
                          id:
                            type: "string"
                            description: "Unique key or identifier of the evaluator"
                          sample_rate:
                            type: "number"
                            minimum: 1
                            maximum: 100
                            default: 50
                            description: "The percentage of executions to evaluate with this evaluator (1-100). For example, a value of 50 means the evaluator will run on approximately half of the executions."
                          execute_on:
                            type: "string"
                            enum:
                              - "input"
                              - "output"
                            description: "Determines whether the evaluator runs on the agent input (user message) or output (agent response)."
                        required:
                          - "id"
                          - "execute_on"
                      title: "Agent guardrail configuration"
                      description: "Configuration for a guardrail applied to the agent"
                path:
                  type: "string"
                  description: "Entity storage path in the format: `project/folder/subfolder/...`\n\nThe first element identifies the project, followed by nested folders (auto-created as needed).\n\nWith project-based API keys, the first element is treated as a folder name, as the project is predetermined by the API key."
                  example: "Default"
                memory_stores:
                  type: "array"
                  items:
                    type: "string"
                  description: "Array of memory store identifiers. Accepts both memory store IDs and keys."
                knowledge_bases:
                  type: "array"
                  items:
                    type: "object"
                    properties:
                      knowledge_id:
                        type: "string"
                        description: "Unique identifier of the knowledge base to search"
                        example: "customer-knowledge-base"
                    required:
                      - "knowledge_id"
                team_of_agents:
                  type: "array"
                  items:
                    type: "object"
                    properties:
                      key:
                        type: "string"
                        description: "The unique key of the agent within the workspace"
                      role:
                        type: "string"
                        description: "The role of the agent in this context. This is used to give extra information to the leader to help it decide which agent to hand off to."
                    required:
                      - "key"
                  title: "Team of agents"
                  description: "The agents that are accessible to this orchestrator. The main agent can hand off to these agents to perform tasks."
                variables:
                  type: "object"
                  additionalProperties: {}
                  description: "Extracted variables from agent instructions"
                engine:
                  type: "string"
                  enum:
                    - "text"
                    - "jinja"
                    - "mustache"
                a2a:
                  type: "object"
                  properties:
                    agent_url:
                      type: "string"
                      format: "uri"
                      description: "Update the A2A agent endpoint URL"
                    card_url:
                      type: "string"
                      format: "uri"
                      description: "Update the explicit agent card URL"
                    headers:
                      type: "object"
                      description: "Update HTTP headers for authentication. **Credential preservation**: Use empty string (\"\") for encrypted header values to keep existing credentials without re-entry. Provide new values to rotate credentials. Omit headers entirely to remove them."
                      additionalProperties:
                        type: "object"
                        properties:
                          value:
                            type: "string"
                            maxLength: 2048
                            description: "Header value. **Update behavior**: Provide empty string (\"\") to preserve existing encrypted value without re-entering credentials. Provide new value to rotate. Omit header entirely to remove."
                          encrypted:
                            type: "boolean"
                            default: false
                        required:
                          - "value"
                  title: "Update A2A Configuration"
                  description: "Update A2A agent configuration (only applicable to A2A agents)"
                versionIncrement:
                  type: "string"
                  enum:
                    - "major"
                    - "minor"
                    - "patch"
                  description: "Optional semantic version bump to create after a successful publish."
                versionDescription:
                  type: "string"
                  maxLength: 300
                  description: "Optional description stored with the created version."
      responses:
        "200":
          description: "Agent configuration successfully updated. Returns the complete updated agent manifest reflecting all changes made."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  _id:
                    type: "string"
                  key:
                    type: "string"
                    pattern: "^[A-Za-z][A-Za-z0-9]*([._-][A-Za-z0-9]+)*$"
                    description: "Unique identifier for the agent within the workspace"
                  display_name:
                    type: "string"
                  project_id:
                    type: "string"
                  created_by_id:
                    type:
                      - "string"
                      - "null"
                  updated_by_id:
                    type:
                      - "string"
                      - "null"
                  created:
                    type: "string"
                  updated:
                    type: "string"
                  status:
                    type: "string"
                    enum:
                      - "live"
                      - "draft"
                      - "pending"
                      - "published"
                    description: "The status of the agent. `Live` is the latest version of the agent. `Draft` is a version that is not yet published. `Pending` is a version that is pending approval. `Published` is a version that was live and has been replaced by a new version."
                  version:
                    type: "string"
                    description: "Current semantic version of the agent manifest."
                  path:
                    type: "string"
                    description: "Entity storage path in the format: `project/folder/subfolder/...`\n\nThe first element identifies the project, followed by nested folders (auto-created as needed).\n\nWith project-based API keys, the first element is treated as a folder name, as the project is predetermined by the API key."
                    example: "Default"
                  memory_stores:
                    type: "array"
                    items:
                      type: "string"
                    default: []
                    description: "Array of memory store identifiers. Accepts both memory store IDs and keys."
                  team_of_agents:
                    type: "array"
                    items:
                      type: "object"
                      properties:
                        key:
                          type: "string"
                          description: "The unique key of the agent within the workspace"
                        role:
                          type: "string"
                          description: "The role of the agent in this context. This is used to give extra information to the leader to help it decide which agent to hand off to."
                      required:
                        - "key"
                    default: []
                    description: "The agents that are accessible to this orchestrator. The main agent can hand off to these agents to perform tasks."
                  metrics:
                    type: "object"
                    properties:
                      total_cost:
                        type: "number"
                        minimum: 0
                        default: 0
                    default:
                      total_cost: 0
                  variables:
                    type: "object"
                    additionalProperties: {}
                    description: "Extracted variables from agent instructions"
                  knowledge_bases:
                    type: "array"
                    items:
                      type: "object"
                      properties:
                        knowledge_id:
                          type: "string"
                          description: "Unique identifier of the knowledge base to search"
                          example: "customer-knowledge-base"
                      required:
                        - "knowledge_id"
                    description: "Agent knowledge bases reference"
                  source:
                    type: "string"
                    enum:
                      - "internal"
                      - "external"
                      - "experiment"
                  engine:
                    type: "string"
                    enum:
                      - "text"
                      - "jinja"
                      - "mustache"
                    default: "text"
                  type:
                    type: "string"
                    enum:
                      - "internal"
                      - "a2a"
                    default: "internal"
                    description: "Agent type: internal (Orquesta-managed) or a2a (external A2A-compliant)"
                  role:
                    type: "string"
                    minLength: 1
                  description:
                    type: "string"
                  system_prompt:
                    type:
                      - "string"
                      - "null"
                    minLength: 1
                  instructions:
                    type: "string"
                  settings:
                    type: "object"
                    properties:
                      max_iterations:
                        type: "integer"
                        exclusiveMinimum: 0
                        maximum: 100
                        minimum: 1
                        default: 100
                        description: "Maximum iterations(llm calls) before the agent will stop executing."
                      max_execution_time:
                        type: "integer"
                        minimum: 2
                        exclusiveMinimum: 0
                        maximum: 600
                        default: 600
                        description: "Maximum time (in seconds) for the agent thinking process. This does not include the time for tool calls and sub agent calls. It will be loosely enforced, the in progress LLM calls will not be terminated and the last assistant message will be returned."
                      max_cost:
                        type: "number"
                        minimum: 0
                        default: 0
                        description: "Maximum cost in USD for the agent execution. When the accumulated cost exceeds this limit, the agent will stop executing. Set to 0 for unlimited. Only supported in v3 responses"
                      tool_approval_required:
                        type: "string"
                        enum:
                          - "all"
                          - "respect_tool"
                          - "none"
                        default: "respect_tool"
                        description: "If all, the agent will require approval for all tools. If respect_tool, the agent will require approval for tools that have the requires_approval flag set to true. If none, the agent will not require approval for any tools."
                      tools:
                        type: "array"
                        items:
                          type: "object"
                          properties:
                            id:
                              type: "string"
                              format: "ulid"
                              pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
                              readOnly: true
                              description: "The id of the resource"
                            key:
                              type: "string"
                              description: "Optional tool key for custom tools"
                            action_type:
                              type: "string"
                            display_name:
                              type: "string"
                            description:
                              type: "string"
                              description: "Optional tool description"
                            requires_approval:
                              type: "boolean"
                              default: false
                            tool_id:
                              type: "string"
                              description: "Nested tool ID for MCP tools (identifies specific tool within MCP server)"
                            conditions:
                              type: "array"
                              items:
                                type: "object"
                                properties:
                                  condition:
                                    type: "string"
                                    description: "The argument of the tool call to evaluate"
                                  operator:
                                    type: "string"
                                    description: "The operator to use"
                                  value:
                                    type: "string"
                                    description: "The value to compare against"
                                required:
                                  - "condition"
                                  - "operator"
                                  - "value"
                              default: []
                            timeout:
                              type: "number"
                              minimum: 1
                              maximum: 600
                              default: 120
                              description: "Tool execution timeout in seconds (default: 2 minutes, max: 10 minutes)"
                          required:
                            - "id"
                            - "action_type"
                        default: []
                      evaluators:
                        type: "array"
                        items:
                          type: "object"
                          properties:
                            id:
                              type: "string"
                              description: "Unique key or identifier of the evaluator"
                            sample_rate:
                              type: "number"
                              minimum: 1
                              maximum: 100
                              default: 50
                              description: "The percentage of executions to evaluate with this evaluator (1-100). For example, a value of 50 means the evaluator will run on approximately half of the executions."
                            execute_on:
                              type: "string"
                              enum:
                                - "input"
                                - "output"
                              description: "Determines whether the evaluator runs on the agent input (user message) or output (agent response)."
                          required:
                            - "id"
                            - "execute_on"
                        title: "Agent evaluator configuration"
                        description: "Configuration for an evaluator applied to the agent"
                      guardrails:
                        type: "array"
                        items:
                          type: "object"
                          properties:
                            id:
                              type: "string"
                              description: "Unique key or identifier of the evaluator"
                            sample_rate:
                              type: "number"
                              minimum: 1
                              maximum: 100
                              default: 50
                              description: "The percentage of executions to evaluate with this evaluator (1-100). For example, a value of 50 means the evaluator will run on approximately half of the executions."
                            execute_on:
                              type: "string"
                              enum:
                                - "input"
                                - "output"
                              description: "Determines whether the evaluator runs on the agent input (user message) or output (agent response)."
                          required:
                            - "id"
                            - "execute_on"
                        title: "Agent guardrail configuration"
                        description: "Configuration for a guardrail applied to the agent"
                    default:
                      max_execution_time: 600
                      max_iterations: 100
                      max_cost: 0
                      tool_approval_required: "respect_tool"
                      tools: []
                  model:
                    type: "object"
                    properties:
                      id:
                        type: "string"
                        description: "The database ID of the primary model"
                      integration_id:
                        type:
                          - "string"
                          - "null"
                        description: "Optional integration ID for custom model configurations"
                      parameters:
                        type: "object"
                        properties:
                          name:
                            type: "string"
                            description: "The name to display on the trace. If not specified, the default system name will be used."
                          frequency_penalty:
                            type:
                              - "number"
                              - "null"
                            description: "Number between -2.0 and 2.0. Positive values penalize new tokens based on their existing frequency in the text so far, decreasing the model's likelihood to repeat the same line verbatim."
                          max_tokens:
                            type:
                              - "integer"
                              - "null"
                            description: "`[Deprecated]`. The maximum number of tokens that can be generated in the chat completion. This value can be used to control costs for text generated via API. \n\n This value is now `deprecated` in favor of `max_completion_tokens`, and is not compatible with o1 series models."
                          max_completion_tokens:
                            type:
                              - "integer"
                              - "null"
                            exclusiveMinimum: 0
                            description: "An upper bound for the number of tokens that can be generated for a completion, including visible output tokens and reasoning tokens"
                          presence_penalty:
                            type:
                              - "number"
                              - "null"
                            description: "Number between -2.0 and 2.0. Positive values penalize new tokens based on whether they appear in the text so far, increasing the model's likelihood to talk about new topics."
                          response_format:
                            oneOf:
                              - type: "object"
                                properties:
                                  type:
                                    type: "string"
                                    enum:
                                      - "text"
                                required:
                                  - "type"
                                title: "Text"
                                description: "\n\nDefault response format. Used to generate text responses"
                              - type: "object"
                                properties:
                                  type:
                                    type: "string"
                                    enum:
                                      - "json_object"
                                required:
                                  - "type"
                                title: "JSON object"
                                description: "\n\nJSON object response format. An older method of generating JSON responses. Using `json_schema` is recommended for models that support it. Note that the model will not generate JSON without a system or user message instructing it to do so."
                              - type: "object"
                                properties:
                                  type:
                                    type: "string"
                                    enum:
                                      - "json_schema"
                                  json_schema:
                                    type: "object"
                                    properties:
                                      description:
                                        type: "string"
                                        description: "A description of what the response format is for, used by the model to determine how to respond in the format."
                                      name:
                                        type: "string"
                                        description: "The name of the response format. Must be a-z, A-Z, 0-9, or contain underscores and dashes, with a maximum length of 64."
                                      schema:
                                        description: "The schema for the response format, described as a JSON Schema object."
                                      strict:
                                        type: "boolean"
                                        default: false
                                        description: "Whether to enable strict schema adherence when generating the output. If set to true, the model will always follow the exact schema defined in the schema field. Only a subset of JSON Schema is supported when strict is true."
                                    required:
                                      - "name"
                                required:
                                  - "type"
                                  - "json_schema"
                                title: "JSON schema"
                                description: "\n\nJSON Schema response format. Used to generate structured JSON responses"
                            description: "An object specifying the format that the model must output"
                          reasoning_effort:
                            type: "string"
                            enum:
                              - "none"
                              - "minimal"
                              - "low"
                              - "medium"
                              - "high"
                              - "xhigh"
                            description: "Constrains effort on reasoning for [reasoning models](https://platform.openai.com/docs/guides/reasoning). Currently supported values are `none`, `minimal`, `low`, `medium`, `high`, and `xhigh`. Reducing reasoning effort can result in faster responses and fewer tokens used on reasoning in a response.\n\n- `gpt-5.1` defaults to `none`, which does not perform reasoning. The supported reasoning values for `gpt-5.1` are `none`, `low`, `medium`, and `high`. Tool calls are supported for all reasoning values in gpt-5.1.\n- All models before `gpt-5.1` default to `medium` reasoning effort, and do not support `none`.\n- The `gpt-5-pro` model defaults to (and only supports) `high` reasoning effort.\n- `xhigh` is currently only supported for `gpt-5.1-codex-max`.\n\nAny of \"none\", \"minimal\", \"low\", \"medium\", \"high\", \"xhigh\"."
                          verbosity:
                            type: "string"
                            description: "Adjusts response verbosity. Lower levels yield shorter answers."
                          seed:
                            type:
                              - "number"
                              - "null"
                            description: "If specified, our system will make a best effort to sample deterministically, such that repeated requests with the same seed and parameters should return the same result."
                          stop:
                            anyOf:
                              - type: "string"
                              - type: "array"
                                items:
                                  type: "string"
                                maxItems: 4
                              - type: "null"
                            description: "Up to 4 sequences where the API will stop generating further tokens."
                          thinking:
                            oneOf:
                              - $ref: "#/components/schemas/ThinkingConfigDisabledSchema"
                              - $ref: "#/components/schemas/ThinkingConfigEnabledSchema"
                              - $ref: "#/components/schemas/ThinkingConfigAdaptiveSchema"
                            discriminator:
                              propertyName: "type"
                              mapping:
                                disabled: "#/components/schemas/ThinkingConfigDisabledSchema"
                                enabled: "#/components/schemas/ThinkingConfigEnabledSchema"
                                adaptive: "#/components/schemas/ThinkingConfigAdaptiveSchema"
                          temperature:
                            type:
                              - "number"
                              - "null"
                            minimum: 0
                            maximum: 2
                            description: "What sampling temperature to use, between 0 and 2. Higher values like 0.8 will make the output more random, while lower values like 0.2 will make it more focused and deterministic."
                          top_p:
                            type:
                              - "number"
                              - "null"
                            minimum: 0
                            maximum: 1
                            description: "An alternative to sampling with temperature, called nucleus sampling, where the model considers the results of the tokens with top_p probability mass. "
                          top_k:
                            type:
                              - "number"
                              - "null"
                            description: "Limits the model to consider only the top k most likely tokens at each step."
                          tool_choice:
                            anyOf:
                              - type: "string"
                                enum:
                                  - "none"
                                  - "auto"
                                  - "required"
                              - type: "object"
                                properties:
                                  type:
                                    type: "string"
                                    enum:
                                      - "function"
                                    description: "The type of the tool. Currently, only function is supported."
                                  function:
                                    type: "object"
                                    properties:
                                      name:
                                        type: "string"
                                        description: "The name of the function to call."
                                    required:
                                      - "name"
                                required:
                                  - "function"
                            description: "Controls which (if any) tool is called by the model."
                          parallel_tool_calls:
                            type: "boolean"
                            description: "Whether to enable parallel function calling during tool use."
                          modalities:
                            type:
                              - "array"
                              - "null"
                            items:
                              type: "string"
                              enum:
                                - "text"
                                - "audio"
                            description: "Output types that you would like the model to generate. Most models are capable of generating text, which is the default: [\"text\"]. The gpt-4o-audio-preview model can also be used to generate audio. To request that this model generate both text and audio responses, you can use: [\"text\", \"audio\"]."
                          guardrails:
                            type: "array"
                            items:
                              type: "object"
                              properties:
                                id:
                                  anyOf:
                                    - type: "string"
                                      enum:
                                        - "orq_pii_detection"
                                        - "orq_sexual_moderation"
                                        - "orq_harmful_moderation"
                                      description: "The key of the guardrail."
                                    - type: "string"
                                      description: "Unique key or identifier of the evaluator"
                                execute_on:
                                  type: "string"
                                  enum:
                                    - "input"
                                    - "output"
                                  description: "Determines whether the guardrail runs on the input (user message) or output (model response)."
                              required:
                                - "id"
                                - "execute_on"
                            description: "A list of guardrails to apply to the request."
                          fallbacks:
                            type: "array"
                            items:
                              type: "object"
                              properties:
                                model:
                                  type: "string"
                                  description: "Fallback model identifier"
                                  example: "openai/gpt-4o-mini"
                              required:
                                - "model"
                            description: "Array of fallback models to use if primary model fails"
                          cache:
                            type: "object"
                            properties:
                              ttl:
                                type: "number"
                                minimum: 1
                                maximum: 259200
                                default: 1800
                                description: "Time to live for cached responses in seconds. Maximum 259200 seconds (3 days)."
                                example: 3600
                              type:
                                type: "string"
                                enum:
                                  - "exact_match"
                            required:
                              - "type"
                            description: "Cache configuration for the request."
                          load_balancer:
                            oneOf:
                              - type: "object"
                                properties:
                                  type:
                                    type: "string"
                                    enum:
                                      - "weight_based"
                                  models:
                                    type: "array"
                                    items:
                                      type: "object"
                                      properties:
                                        model:
                                          type: "string"
                                          description: "Model identifier for load balancing"
                                          example: "openai/gpt-4o"
                                        weight:
                                          type: "number"
                                          minimum: 0.001
                                          maximum: 1
                                          default: 0.5
                                          description: "Weight assigned to this model for load balancing"
                                          example: 0.7
                                      required:
                                        - "model"
                                required:
                                  - "type"
                                  - "models"
                            description: "Load balancer configuration for the request."
                            example:
                              type: "weight_based"
                              models:
                                - model: "openai/gpt-4o"
                                  weight: 0.7
                                - model: "anthropic/claude-3-5-sonnet"
