          type: "string"
          enum:
            - "user"
            - "agent"
            - "tool"
            - "system"
        parts:
          type: "array"
          items:
            oneOf:
              - $ref: "#/components/schemas/TextPart"
              - $ref: "#/components/schemas/ErrorPart"
              - $ref: "#/components/schemas/DataPart"
              - $ref: "#/components/schemas/FilePart"
              - $ref: "#/components/schemas/ToolCallPart"
              - $ref: "#/components/schemas/ToolResultPart"
            discriminator:
              propertyName: "kind"
              mapping:
                text: "#/components/schemas/TextPart"
                error: "#/components/schemas/ErrorPart"
                data: "#/components/schemas/DataPart"
                file: "#/components/schemas/FilePart"
                tool_call: "#/components/schemas/ToolCallPart"
                tool_result: "#/components/schemas/ToolResultPart"
        metadata:
          type: "object"
          additionalProperties: {}
      required:
        - "messageId"
        - "role"
        - "parts"
      title: "Agent Response Message"
      description: "Response message from an agent execution."
    TextPart:
      type: "object"
      properties:
        kind:
          type: "string"
          enum:
            - "text"
        text:
          type: "string"
      required:
        - "kind"
        - "text"
      title: "Text Part"
      description: "A text content part containing plain text or markdown. Used for agent messages, user input, and text-based responses."
    ErrorPart:
