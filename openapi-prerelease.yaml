          description: "Configurations Retrieved."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  id:
                    type: "string"
                    description: "A unique identifier for the response. Can be used to add metrics to the transaction."
                  provider:
                    type: "string"
                    description: "The provider of the model"
                  model:
                    type: "string"
                    description: "The model of the configuration"
                  type:
                    type: "string"
                    enum:
                      - "chat"
                      - "completion"
                      - "embedding"
                      - "image"
                      - "tts"
                      - "stt"
                      - "rerank"
                      - "ocr"
                      - "moderation"
                      - "vision"
                    description: "The type of the model. Current `chat`,`completion` and `image` are supported"
                  version:
                    type: "string"
                    description: "The current version of the deployment"
                  messages:
                    type: "array"
                    items:
                      type: "object"
                      properties:
                        role:
                          type: "string"
                          enum:
                            - "system"
                            - "developer"
                            - "assistant"
                            - "user"
                            - "exception"
                            - "tool"
                            - "prompt"
                            - "correction"
                            - "expected_output"
                          description: "The role of the prompt message"
                        content:
                          anyOf:
                            - type: "string"
                            - type: "array"
                              items:
                                oneOf:
                                  - type: "object"
                                    properties:
                                      type:
                                        type: "string"
                                        enum:
                                          - "text"
                                      text:
                                        type: "string"
                                    required:
                                      - "type"
                                      - "text"
                                    description: "Text content part of a prompt message"
                                  - type: "object"
                                    properties:
                                      type:
                                        type: "string"
                                        enum:
                                          - "image_url"
                                      image_url:
                                        type: "object"
                                        properties:
                                          id:
                                            type: "string"
                                            format: "ulid"
                                            pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
                                            readOnly: true
                                            description: "The orq.ai id of the image"
                                          url:
                                            type: "string"
                                            description: "Either a URL of the image or the base64 encoded data URI."
                                            examples:
                                              - "https://picsum.photos/id/1/200/300"
                                              - "data:image/jpeg;base64,"
                                          detail:
                                            type: "string"
                                            description: "Specifies the detail level of the image. Currently only supported with OpenAI models"
                                        required:
                                          - "url"
                                    required:
                                      - "type"
                                      - "image_url"
                                    description: "The image part of the prompt message. Only supported with vision models."
                                  - type: "object"
                                    properties:
                                      type:
                                        type: "string"
                                        enum:
                                          - "file"
                                        description: "The type of the content part. Always `file`."
                                      file:
                                        type: "object"
                                        properties:
                                          file_data:
                                            type: "string"
                                            description: "The file data as a data URI string in the format 'data:<mime-type>;base64,<base64-encoded-data>'. Example: 'data:image/png;base64,iVBORw0KGgoAAAANS...'"
                                          uri:
                                            type: "string"
                                            description: "URL to the file. Only supported by Anthropic Claude models for PDF files."
                                          mimeType:
                                            type: "string"
                                            description: "MIME type of the file (e.g., application/pdf, image/png)"
                                          filename:
                                            type: "string"
                                            description: "The name of the file, used when passing the file to the model as a string."
                                    required:
                                      - "type"
                                      - "file"
                            - type: "null"
                          description: "The contents of the user message. Either the text content of the message or an array of content parts with a defined type, each can be of type `text` or `image_url` when passing in images. You can pass multiple images by adding multiple `image_url` content parts. Can be null for tool messages in certain scenarios."
                        tool_calls:
                          type: "array"
                          items:
                            type: "object"
                            properties:
                              id:
                                type: "string"
                              index:
                                type: "number"
                              type:
                                type: "string"
                                enum:
                                  - "function"
                              function:
                                type: "object"
                                properties:
                                  name:
                                    type: "string"
                                  arguments:
                                    type: "string"
                                    description: "JSON string arguments for the functions"
                                required:
                                  - "name"
                                  - "arguments"
                            required:
                              - "type"
                              - "function"
                        tool_call_id:
                          type:
                            - "string"
                            - "null"
                      required:
                        - "role"
                        - "content"
                  parameters:
                    type: "object"
                    properties:
                      temperature:
                        type: "number"
                        description: "Only supported on `chat` and `completion` models."
                      maxTokens:
                        type: "number"
                        description: "Only supported on `chat` and `completion` models."
                      topK:
                        type: "number"
                        description: "Only supported on `chat` and `completion` models."
                      topP:
