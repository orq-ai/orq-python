  /v2/router/embeddings:
    post:
      operationId: "createEmbedding"
      summary: "Create embeddings"
      tags:
        - "Embeddings"
      x-speakeasy-group: "router.embeddings"
      x-speakeasy-name-override: "create"
      x-cli-group: "embeddings"
      x-cli-name: "create"
      x-speakeasy-ignore: false
      x-orq-gateway-group: "true"
      description: "Get a vector representation of a given input that can be easily consumed by machine learning models and algorithms."
      requestBody:
        required: true
        description: "input"
        content:
          application/json:
            schema:
              type: "object"
              properties:
                input:
                  anyOf:
                    - type: "string"
                      minLength: 1
                    - type: "array"
                      items:
                        type: "string"
                        minLength: 1
                      minItems: 1
                  description: "Input text to embed, encoded as a string or array of tokens."
                model:
                  type: "string"
                  description: "ID of the model to use"
                encoding_format:
                  type: "string"
                  enum:
                    - "base64"
                    - "float"
                  default: "float"
                  description: "Type of the document element"
                dimensions:
                  type: "number"
                  description: "The number of dimensions the resulting output embeddings should have."
                user:
                  type: "string"
                  description: "A unique identifier representing your end-user"
                name:
                  type: "string"
                  description: "The name to display on the trace. If not specified, the default system name will be used."
                fallbacks:
                  type: "array"
                  items:
                    type: "object"
                    properties:
                      model:
                        type: "string"
                        description: "Fallback model identifier"
                        example: "openai/text-embedding-3-small"
                    required:
                      - "model"
                  description: "Array of fallback models to use if primary model fails"
                retry:
                  type: "object"
                  properties:
                    count:
                      type: "number"
                      minimum: 1
                      maximum: 5
                      default: 3
                      description: "Number of retry attempts (1-5)"
                      example: 3
                    on_codes:
                      type: "array"
                      items:
                        type: "number"
                        minimum: 100
                        maximum: 599
                      minItems: 1
                      default:
                        - 429
                      description: "HTTP status codes that trigger retry logic"
                      example:
                        - 429
                        - 500
                        - 502
                        - 503
                        - 504
                  description: "Retry configuration for the request"
                cache:
                  type: "object"
                  properties:
                    ttl:
                      type: "number"
                      minimum: 1
                      maximum: 259200
                      default: 1800
                      description: "Time to live for cached responses in seconds. Maximum 259200 seconds (3 days)."
                      example: 3600
                    type:
                      type: "string"
                      enum:
                        - "exact_match"
                  required:
                    - "type"
                  description: "Cache configuration for the request."
                load_balancer:
                  oneOf:
                    - type: "object"
                      properties:
                        type:
                          type: "string"
                          enum:
                            - "weight_based"
                        models:
                          type: "array"
                          items:
                            type: "object"
                            properties:
                              model:
                                type: "string"
                                description: "Model identifier for load balancing"
                                example: "openai/gpt-4o"
                              weight:
                                type: "number"
                                minimum: 0.001
                                maximum: 1
                                default: 0.5
                                description: "Weight assigned to this model for load balancing"
                                example: 0.7
                            required:
                              - "model"
                      required:
                        - "type"
                        - "models"
                  description: "Load balancer configuration for the request."
                timeout:
                  type: "object"
                  properties:
                    call_timeout:
                      type: "number"
                      minimum: 1
                      description: "Timeout value in milliseconds"
                      example: 30000
                  required:
                    - "call_timeout"
                  description: "Timeout configuration to apply to the request. If the request exceeds the timeout, it will be retried or fallback to the next model if configured."
                orq:
                  type: "object"
                  properties:
                    name:
                      type: "string"
                      description: "The name to display on the trace. If not specified, the default system name will be used."
                    fallbacks:
                      type: "array"
                      items:
                        type: "object"
                        properties:
                          model:
                            type: "string"
