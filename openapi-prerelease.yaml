          type: "string"
          description: "ISO timestamp of when the event occurred"
        data:
          type: "object"
          properties:
            responseId:
              type: "string"
              description: "Unique identifier for this response"
            taskId:
              type: "string"
              description: "The agent execution task ID. Use responseId for tracking instead."
