      x-cli-name: "create"
      requestBody:
        content:
          application/json:
            schema:
              type: "object"
              properties:
                id:
                  type: "string"
                  format: "ulid"
                  description: "Unique identifier for the feedback"
                property:
                  type: "string"
                  description: "A string describing the specific property or aspect rated."
