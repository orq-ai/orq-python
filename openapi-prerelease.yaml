              - description: "An MCP (Model Context Protocol) server tool. Provide server_url for inline mode, or key to reference a pre-configured MCP server."
                properties:
                  allowed_tools:
                    description: "Filter which tools from the MCP server are exposed."
                    properties:
                      read_only:
                        description: "Only expose tools with readOnlyHint annotation."
                        type: "boolean"
                      tool_names:
                        description: "List of allowed tool names."
                        items:
                          type: "string"
                        type: "array"
                    type: "object"
                  headers:
                    additionalProperties:
                      type: "string"
                    description: "Custom headers to send with MCP requests. Values support {{variable}} templates."
                    type: "object"
                  key:
                    description: "Unique identifier. Required for pre-configured MCP servers (lookup key). For inline servers, used as a trace/display label."
                    type: "string"
                  server_description:
                    description: "Human-readable description of the server."
                    type: "string"
                  server_url:
                    description: "The MCP server endpoint URL (inline mode)."
                    type: "string"
                  type:
                    enum:
                      - "mcp"
                    type: "string"
                required:
                  - "type"
                title: "MCP Tool"
                type: "object"
            description: "A tool definition. The \"type\" field determines the tool kind."
          type: "array"
        top_logprobs:
          description: "Number of most likely tokens to return at each position."
          format: "int64"
          type: "integer"
        top_p:
          description: "Nucleus sampling parameter."
          format: "double"
          type: "number"
        variables:
          additionalProperties: {}
          description: "Template variables for prompt substitution. Plain values fill {{variable}} placeholders in instructions. For secrets, use {\"secret\": true, \"value\": \"sensitive-data\"} — secrets are automatically passed to platform tools (Python, HTTP, MCP) and redacted from traces."
          type: "object"
      type: "object"
    PublicCreateScheduleBody:
      additionalProperties: false
      properties:
        agent_tag:
          description: "Pin this schedule to a specific agent version. Omit to always use the active version."
          type: "string"
        expression:
          description: "Schedule expression. Examples: cron '0 0 9 * * mon-fri' (9am UTC weekdays), interval '@every 1h', once '@at 2026-05-01T09:00:00Z'. Minimum firing cadence is 1 hour for cron and interval."
          type: "string"
        payload:
          $ref: "#/components/schemas/PublicSchedulePayload"
          description: "Invocation payload delivered to the agent on every firing."
        type:
          description: "Schedule type. cron uses 6-field cron expressions; interval uses @every <duration>; once uses @at <RFC3339-UTC>."
          enum:
            - "cron"
            - "once"
            - "interval"
          type: "string"
      required:
        - "type"
        - "expression"
        - "payload"
      type: "object"
    PublicSchedule:
      additionalProperties: false
      properties:
        _id:
          description: "ULID identifying this schedule."
          type: "string"
        agent_key:
          type: "string"
        agent_tag:
          description: "Pinned agent version. Omit to always run the agent's current active version."
          type: "string"
        created:
          format: "date-time"
          type: "string"
        created_by_id:
          description: "ID of the API key that created the schedule."
          type: "string"
        expression:
          description: "Cron expression (6-field, seconds required), @every duration, @at RFC3339 timestamp, or a predefined descriptor like @hourly/@daily."
          type: "string"
        generation:
          description: "Monotonic counter bumped when the schedule's firing cadence changes. Used by the consumer to skip stale in-flight triggers."
          format: "int64"
          type: "integer"
        is_active:
          description: "Whether the schedule is currently firing. once schedules flip to false automatically after firing."
          type: "boolean"
        last_triggered_at:
          description: "Timestamp of the most recent firing, if any."
          format: "date-time"
          type: "string"
        payload:
          $ref: "#/components/schemas/PublicSchedulePayload"
        trigger_count:
          description: "Total firings since creation or last expression/type change."
          format: "int64"
          type: "integer"
        type:
          description: "Schedule type."
          enum:
            - "cron"
            - "once"
            - "interval"
          type: "string"
        updated:
          format: "date-time"
          type: "string"
        workspace_id:
          type: "string"
      required:
        - "_id"
        - "workspace_id"
        - "agent_key"
        - "type"
        - "expression"
        - "is_active"
        - "generation"
        - "payload"
        - "created_by_id"
        - "created"
        - "updated"
        - "trigger_count"
      type: "object"
    PublicScheduleErrorDetail:
      additionalProperties: false
      properties:
        code:
          description: "Stable error code, e.g. invalid_expression, schedule_not_found, agent_not_found."
          type: "string"
        message:
          description: "Human-readable error description."
          type: "string"
      required:
        - "code"
        - "message"
      type: "object"
    PublicSchedulePayload:
      additionalProperties: false
      properties:
        input:
          description: "Input to pass to the agent on each firing. Same shape as the Responses API input — a string or an array of input items."
        memory_entity_id:
          description: "Optional memory store entity ID to attach to each run."
          type: "string"
        metadata:
          additionalProperties: {}
          description: "Opaque key/value pairs attached to every response generated by this schedule."
          type: "object"
        variables:
          additionalProperties: {}
          description: "Template variables substituted into instructions. Supports secret values: {\"secret\": true, \"value\": \"...\"}."
          type: "object"
      type: "object"
    PublicUpdateScheduleBody:
      additionalProperties: false
      properties:
        agent_tag:
          description: "Change the pinned agent version."
          type: "string"
        expression:
          description: "Update the schedule expression. Minimum firing cadence is 1 hour for cron and interval."
          type: "string"
        is_active:
          description: "Activate or deactivate the schedule. Deactivating removes the NATS entry; activating re-publishes with current values."
          type: "boolean"
        payload:
          $ref: "#/components/schemas/PublicSchedulePayload"
          description: "Update the invocation payload. Payload-only changes do not reset the firing cadence or bump generation."
        type:
          description: "Change the schedule type. Changing type or expression resets the NATS schedule and bumps generation."
          enum:
            - "cron"
            - "once"
            - "interval"
          type: "string"
      type: "object"
    PublicUsage:
      additionalProperties: false
      properties:
        input_tokens:
          format: "int64"
          type: "integer"
        input_tokens_details:
          $ref: "#/components/schemas/InputTokensDetails"
        output_tokens:
          format: "int64"
          type: "integer"
        output_tokens_details:
          $ref: "#/components/schemas/OutputTokensDetails"
        total_tokens:
          format: "int64"
          type: "integer"
        web_search_requests:
          format: "int64"
          type: "integer"
      required:
        - "input_tokens"
        - "output_tokens"
        - "total_tokens"
        - "input_tokens_details"
        - "output_tokens_details"
      type: "object"
    Reasoning:
      additionalProperties: false
      properties:
        effort:
          type: "string"
        summary:
          type: "string"
      type: "object"
    ReasoningParam:
      additionalProperties: false
      properties:
        effort:
          type: "string"
        summary:
          type: "string"
      type: "object"
    ResponseError:
      additionalProperties: false
      properties:
        code:
          type: "string"
        message:
          type: "string"
      required:
        - "code"
        - "message"
      type: "object"
    ResponseIdentity:
      additionalProperties: false
      properties:
        display_name:
          type: "string"
        email:
          type: "string"
        id:
          type: "string"
        metadata:
          items:
            additionalProperties: {}
            type: "object"
          type:
            - "array"
            - "null"
        tags:
          items:
            type: "string"
          type:
            - "array"
            - "null"
      required:
        - "id"
      type: "object"
    ResponseRetryConfig:
      additionalProperties: false
      properties:
        count:
          description: "Number of retries (1-5)."
          format: "int64"
          type: "integer"
        on_codes:
          description: "HTTP status codes that trigger a retry (e.g. [429, 500, 502, 503])."
          items:
            format: "int64"
            type: "integer"
          type:
            - "array"
            - "null"
      required:
        - "count"
        - "on_codes"
      type: "object"
    ResponseThread:
      additionalProperties: false
      properties:
        id:
          type: "string"
        tags:
          items:
            type: "string"
          type:
            - "array"
            - "null"
      required:
        - "id"
      type: "object"
    StreamOptions:
      additionalProperties: false
      properties:
        include_obfuscation:
          type: "boolean"
      required:
        - "include_obfuscation"
      type: "object"
    ThinkingParam:
      additionalProperties: false
      properties:
        budget_tokens:
          format: "int64"
          type:
            - "integer"
            - "null"
        thinking_level:
          type: "string"
        type:
          type:
            - "string"
            - "null"
      required:
        - "type"
        - "budget_tokens"
      type: "object"
