                required:
                  - "role"
                  - "content"
                  - "tool_call_id"
                title: "Tool message"
          description: "A list of messages to send to the deployment."
        identity:
          $ref: "#/components/schemas/PublicIdentity"
        file_ids:
          type: "array"
          items:
            type: "string"
          description: "A list of file IDs that are associated with the deployment request."
        metadata:
          type: "object"
          additionalProperties: {}
          description: "Key-value pairs that you want to attach to the log generated by this request."
        extra_params:
          type: "object"
          additionalProperties: {}
          description: "Utilized for passing additional parameters to the model provider. Exercise caution when using this feature, as the included parameters will overwrite any parameters specified in the deployment prompt configuration."
        documents:
          type: "array"
          items:
            type: "object"
            properties:
              text:
                type: "string"
                description: "The text content of the document"
              metadata:
                type: "object"
                properties:
                  file_name:
                    type: "string"
                    description: "Name of the file the text is from."
                  file_type:
                    type: "string"
                    description: "Content type of the file the text is from."
                  page_number:
                    type: "number"
                    description: "The page number the text is from."
                description: "Metadata about the document"
            required:
              - "text"
          description: "A list of documents from your external knowledge base (e.g., chunks retrieved from your own vector database or RAG pipeline) that provide context for the model response. These documents can be used by evaluators and guardrails to assess the relevance and accuracy of the model output against the provided context."
          example:
            - text: "The refund policy allows customers to return items within 30 days of purchase for a full refund."
              metadata:
                file_name: "refund_policy.pdf"
                file_type: "application/pdf"
                page_number: 1
            - text: "Premium members receive free shipping on all orders over $50."
              metadata:
                file_name: "membership_benefits.md"
                file_type: "text/markdown"
        invoke_options:
          type: "object"
          properties:
            include_retrievals:
              type: "boolean"
              default: false
              description: "Whether to include the retrieved knowledge chunks in the response."
            include_usage:
              type: "boolean"
              default: false
              description: "Whether to include the usage metrics in the response."
            mock_response:
              type: "string"
              description: "A mock response to use instead of calling the LLM API. This is useful for testing purposes. When provided, the system will return a response object with this content as the completion, without making an actual API call to the LLM provider. This works for both streaming and non-streaming requests. Mock responses will not generate logs, traces or be counted for your plan usage."
        thread:
          type: "object"
          properties:
            id:
              type: "string"
              description: "Unique thread identifier to group related invocations."
            tags:
              type: "array"
              items:
                type: "string"
              description: "Optional tags to differentiate or categorize threads"
          required:
            - "id"
        knowledge_filter:
          anyOf:
            - type: "object"
              additionalProperties:
                anyOf:
                  - type: "object"
                    properties:
                      eq:
                        anyOf:
                          - type: "string"
                            title: "string"
                            description: "String"
                          - type: "number"
                            title: "number"
                            description: "Number"
                          - type: "boolean"
                            title: "boolean"
                            description: "Boolean"
                    required:
                      - "eq"
                    title: "eq"
                    description: "Equal to"
                  - type: "object"
                    properties:
                      ne:
                        anyOf:
                          - type: "string"
                            title: "string"
                            description: "String"
                          - type: "number"
                            title: "number"
                            description: "Number"
                          - type: "boolean"
                            title: "boolean"
                            description: "Boolean"
                    required:
                      - "ne"
                    title: "ne"
                    description: "Not equal to"
                  - type: "object"
                    properties:
                      gt:
                        type: "number"
                    required:
                      - "gt"
                    title: "gt"
                    description: "Greater than"
                  - type: "object"
                    properties:
                      gte:
                        type: "number"
                    required:
                      - "gte"
                    title: "gte"
                    description: "Greater than or equal to"
                  - type: "object"
                    properties:
                      lt:
                        type: "number"
                    required:
                      - "lt"
                    title: "lt"
                    description: "Less than"
                  - type: "object"
                    properties:
                      lte:
                        type: "number"
                    required:
                      - "lte"
                    title: "lte"
                    description: "Less than or equal to"
                  - type: "object"
                    properties:
                      in:
                        type: "array"
                        items:
                          anyOf:
                            - type: "string"
                              title: "string"
                              description: "String"
                            - type: "number"
                              title: "number"
                              description: "Number"
                            - type: "boolean"
                              title: "boolean"
                              description: "Boolean"
                    required:
                      - "in"
                    title: "in"
                    description: "In"
                  - type: "object"
                    properties:
                      nin:
                        type: "array"
                        items:
                          anyOf:
                            - type: "string"
                              title: "string"
                              description: "String"
                            - type: "number"
                              title: "number"
                              description: "Number"
                            - type: "boolean"
                              title: "boolean"
                              description: "Boolean"
                    required:
                      - "nin"
                    title: "nin"
                    description: "Not in"
                  - type: "object"
                    properties:
                      exists:
                        type: "boolean"
                    required:
                      - "exists"
                    title: "exists"
                    description: "Exists"
              title: "Search operator"
            - type: "object"
              properties:
                and:
                  type: "array"
                  items:
                    type: "object"
                    additionalProperties:
                      anyOf:
                        - type: "object"
                          properties:
                            eq:
                              anyOf:
                                - type: "string"
                                  title: "string"
                                  description: "String"
                                - type: "number"
                                  title: "number"
                                  description: "Number"
                                - type: "boolean"
                                  title: "boolean"
                                  description: "Boolean"
                          required:
                            - "eq"
                          title: "eq"
                          description: "Equal to"
                        - type: "object"
                          properties:
                            ne:
                              anyOf:
                                - type: "string"
                                  title: "string"
                                  description: "String"
                                - type: "number"
                                  title: "number"
                                  description: "Number"
                                - type: "boolean"
                                  title: "boolean"
                                  description: "Boolean"
                          required:
                            - "ne"
                          title: "ne"
                          description: "Not equal to"
                        - type: "object"
                          properties:
                            gt:
                              type: "number"
                          required:
                            - "gt"
                          title: "gt"
                          description: "Greater than"
                        - type: "object"
                          properties:
                            gte:
                              type: "number"
                          required:
                            - "gte"
                          title: "gte"
                          description: "Greater than or equal to"
                        - type: "object"
                          properties:
                            lt:
                              type: "number"
                          required:
                            - "lt"
                          title: "lt"
                          description: "Less than"
                        - type: "object"
                          properties:
                            lte:
                              type: "number"
                          required:
                            - "lte"
                          title: "lte"
                          description: "Less than or equal to"
                        - type: "object"
                          properties:
                            in:
                              type: "array"
                              items:
                                anyOf:
                                  - type: "string"
                                    title: "string"
                                    description: "String"
                                  - type: "number"
                                    title: "number"
                                    description: "Number"
                                  - type: "boolean"
                                    title: "boolean"
                                    description: "Boolean"
                          required:
                            - "in"
                          title: "in"
                          description: "In"
                        - type: "object"
                          properties:
                            nin:
                              type: "array"
                              items:
                                anyOf:
                                  - type: "string"
                                    title: "string"
                                    description: "String"
                                  - type: "number"
                                    title: "number"
                                    description: "Number"
                                  - type: "boolean"
                                    title: "boolean"
                                    description: "Boolean"
                          required:
                            - "nin"
                          title: "nin"
                          description: "Not in"
                        - type: "object"
                          properties:
                            exists:
                              type: "boolean"
                          required:
                            - "exists"
                          title: "exists"
                          description: "Exists"
              required:
