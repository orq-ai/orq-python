                        - type: "string"
                        - type: "array"
                          items:
                            anyOf:
                              - type: "object"
                                properties:
                                  role:
                                    type: "string"
                                    enum:
                                      - "user"
                                      - "assistant"
                                      - "system"
                                      - "developer"
                                    description: "The role of the message author"
                                  content:
