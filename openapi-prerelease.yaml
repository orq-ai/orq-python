                trace_id:
                  type: "string"
                  description: "The id returned by the [`get_config`](https://docs.orq.ai/reference/deployments/get-config) or [`invoke`](https://docs.orq.ai/reference/deployments/invoke) endpoints"
                product:
                  type: "string"
                  enum:
                    - "remoteconfigs"
                    - "deployments"
                    - "experiments"
                    - "playgrounds"
                    - "spreadsheets"
                    - "spreadsheet_run"
                    - "llm_evaluator"
                    - "knowledge"
                    - "router"
                    - "workflows"
                    - "external_events"
                    - "agents"
                    - "memory-stores"
                    - "generic"
                    - "evaluators"
                    - "otel"
                    - "ai-chat"
                  default: "deployments"
              required:
                - "property"
                - "value"
                - "trace_id"
      responses:
        "200":
          description: "Event has been dispatched to delete the feedback"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  id:
                    type: "string"
                    format: "ulid"
                    description: "Unique identifier for the feedback"
                  property:
                    type: "string"
                    description: "A string describing the specific property or aspect rated."
                  value:
                    anyOf:
                      - type: "string"
                      - type: "number"
                      - type: "array"
                        items:
                          type: "string"
                    description: "The feedback value. For single selection of multiple choice, the value should be an array of strings. For `correction`, the value should be a string."
                  trace_id:
                    type: "string"
                    description: "The id returned by the [`get_config`](https://docs.orq.ai/reference/deployments/get-config) or [`invoke`](https://docs.orq.ai/reference/deployments/invoke) endpoints"
                  product:
                    type: "string"
                    enum:
                      - "remoteconfigs"
                      - "deployments"
                      - "experiments"
                      - "playgrounds"
                      - "spreadsheets"
                      - "spreadsheet_run"
                      - "llm_evaluator"
                      - "knowledge"
                      - "router"
                      - "workflows"
                      - "external_events"
                      - "agents"
                      - "memory-stores"
                      - "generic"
                      - "evaluators"
                      - "otel"
                      - "ai-chat"
                    default: "deployments"
                required:
                  - "property"
                  - "value"
                  - "trace_id"
        "400":
          description: "Bad Request"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message:
                    type: "string"
                required:
                  - "message"
        "404":
          description: "Workspace ID is not found on the request"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message:
                    type: "string"
                required:
                  - "message"
      security:
        - ApiKey: []
