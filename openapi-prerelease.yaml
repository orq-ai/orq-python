      security:
        - ApiKey: []
    get:
      tags:
        - "Agents"
      x-speakeasy-group: "agents"
      x-speakeasy-name-override: "list"
      x-cli-group: "agents"
      x-cli-name: "list"
      x-speakeasy-max-method-params: 4
      operationId: "ListAgents"
      summary: "List agents"
      description: "Retrieves a comprehensive list of agents configured in your workspace. Supports pagination for large datasets and returns agents sorted by creation date (newest first). Each agent in the response includes its complete configuration: model settings with fallback options, instructions, tools, knowledge bases, memory stores, and execution parameters. Use pagination parameters to efficiently navigate through large collections of agents."
      parameters:
        - schema:
            type: "number"
            minimum: 1
            maximum: 200
            description: "A limit on the number of objects to be returned. Limit can range between 1 and 200. When not provided, returns all agents without pagination."
          required: false
          description: "A limit on the number of objects to be returned. Limit can range between 1 and 200. When not provided, returns all agents without pagination."
          name: "limit"
          in: "query"
        - schema:
            type: "string"
            description: "A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list. For instance, if you make a list request and receive 20 objects, ending with `01JJ1HDHN79XAS7A01WB3HYSDB`, your subsequent call can include `after=01JJ1HDHN79XAS7A01WB3HYSDB` in order to fetch the next page of the list."
          required: false
          description: "A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list. For instance, if you make a list request and receive 20 objects, ending with `01JJ1HDHN79XAS7A01WB3HYSDB`, your subsequent call can include `after=01JJ1HDHN79XAS7A01WB3HYSDB` in order to fetch the next page of the list."
          name: "starting_after"
          in: "query"
        - schema:
            type: "string"
            description: "A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list. For instance, if you make a list request and receive 20 objects, starting with `01JJ1HDHN79XAS7A01WB3HYSDB`, your subsequent call can include `before=01JJ1HDHN79XAS7A01WB3HYSDB` in order to fetch the previous page of the list."
          required: false
          description: "A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list. For instance, if you make a list request and receive 20 objects, starting with `01JJ1HDHN79XAS7A01WB3HYSDB`, your subsequent call can include `before=01JJ1HDHN79XAS7A01WB3HYSDB` in order to fetch the previous page of the list."
          name: "ending_before"
          in: "query"
        - schema:
            type: "string"
            enum:
              - "internal"
              - "a2a"
            description: "Filter agents by type: \"internal\" for Orquesta-managed agents, \"a2a\" for external A2A-compliant agents"
          required: false
          description: "Filter agents by type: \"internal\" for Orquesta-managed agents, \"a2a\" for external A2A-compliant agents"
          name: "type"
          in: "query"
      responses:
        "200":
          description: "Successfully retrieved the list of agents. Returns a paginated response containing agent manifests with complete configurations, including primary and fallback models, tools, knowledge bases, and execution settings."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  object:
                    type: "string"
                    enum:
                      - "list"
                  data:
                    type: "array"
                    items:
                      type: "object"
                      properties:
                        _id:
                          type: "string"
                        key:
                          type: "string"
                          pattern: "^[A-Za-z][A-Za-z0-9]*([._-][A-Za-z0-9]+)*$"
                          description: "Unique identifier for the agent within the workspace"
                        display_name:
                          type: "string"
                        created_by_id:
                          type:
                            - "string"
                            - "null"
                        updated_by_id:
                          type:
                            - "string"
                            - "null"
                        created:
                          type: "string"
                        updated:
                          type: "string"
                        status:
                          type: "string"
                          enum:
                            - "live"
                            - "draft"
                            - "pending"
                            - "published"
                          description: "The status of the agent. `Live` is the latest version of the agent. `Draft` is a version that is not yet published. `Pending` is a version that is pending approval. `Published` is a version that was live and has been replaced by a new version."
                        version:
                          type: "string"
                          description: "Current semantic version of the agent manifest."
                        path:
                          type: "string"
                          description: "Entity storage path in the format: `project/folder/subfolder/...`\n\nThe first element identifies the project, followed by nested folders (auto-created as needed).\n\nWith project-based API keys, the first element is treated as a folder name, as the project is predetermined by the API key."
                          example: "Default"
                        memory_stores:
                          type: "array"
                          items:
                            type: "string"
                          default: []
                          description: "Array of memory store identifiers. Accepts both memory store IDs and keys."
                        team_of_agents:
                          type: "array"
                          items:
                            type: "object"
                            properties:
                              key:
                                type: "string"
                                description: "The unique key of the agent within the workspace"
                              role:
                                type: "string"
                                description: "The role of the agent in this context. This is used to give extra information to the leader to help it decide which agent to hand off to."
                            required:
                              - "key"
                          default: []
                          description: "The agents that are accessible to this orchestrator. The main agent can hand off to these agents to perform tasks."
                        metrics:
