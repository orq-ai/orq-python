                            flagged:
                              type: "boolean"
                              description: "Whether any of the categories are flagged"
                            categories:
                              type: "object"
                              properties:
                                hate:
                                  type: "boolean"
                                  description: "Content that expresses, incites, or promotes hate based on race, gender, ethnicity, religion, nationality, sexual orientation, disability status, or caste."
                                hate/threatening:
                                  type: "boolean"
                                  description: "Hateful content that also includes violence or serious harm towards the targeted group."
                                harassment:
                                  type: "boolean"
                                  description: "Content that expresses, incites, or promotes harassing language towards any target."
                                harassment/threatening:
                                  type: "boolean"
                                  description: "Harassment content that also includes violence or serious harm towards any target."
                                illicit:
                                  type: "boolean"
                                  description: "Content that includes instructions or advice that facilitate the planning or execution of wrongdoing."
                                illicit/violent:
                                  type: "boolean"
                                  description: "Content that includes instructions or advice that facilitate the planning or execution of wrongdoing that also includes violence."
                                self-harm:
                                  type: "boolean"
                                  description: "Content that promotes, encourages, or depicts acts of self-harm, such as suicide, cutting, and eating disorders."
                                self-harm/intent:
                                  type: "boolean"
