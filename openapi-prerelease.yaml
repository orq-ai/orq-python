        type:
          type: "string"
          enum:
            - "image_url"
        image_url:
          type: "object"
          properties:
            url:
              type: "string"
              description: "Either a URL of the image or the base64 encoded image data."
            detail:
              type: "string"
              enum:
                - "low"
                - "high"
                - "auto"
              description: "Specifies the detail level of the image."
          required:
            - "url"
        cache_control:
          type: "object"
          properties:
            type:
              type: "string"
              enum:
                - "ephemeral"
