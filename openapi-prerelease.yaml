                          title: "Plain text"
                          type: "object"
                        - properties:
                            description:
                              type: "string"
                            name:
                              type: "string"
                            schema:
                              description: "The JSON Schema the output must conform to."
                              type: "object"
                            strict:
                              type: "boolean"
                            type:
                              enum:
                                - "json_schema"
                              type: "string"
                          required:
                            - "type"
                          title: "JSON Schema"
                          type: "object"
                      description: "The output format: plain text or structured JSON schema."
                    verbosity:
                      enum:
                        - "low"
                        - "medium"
                        - "high"
                      type: "string"
                  type: "object"
                thread:
                  $ref: "#/components/schemas/ResponseThread"
                  description: "Thread for grouping related requests."
                tool_choice:
                  anyOf:
                    - description: "Shorthand: \"auto\" lets the model decide, \"none\" disables tools, \"required\" forces tool use."
                      enum:
                        - "auto"
                        - "none"
                        - "required"
                      title: "Shorthand"
                      type: "string"
                    - description: "Select a specific function tool by name."
                      properties:
                        name:
                          description: "The name of the function to call."
                          type: "string"
                        type:
                          enum:
                            - "function"
                          type: "string"
                      required:
                        - "type"
                        - "name"
                      title: "Specific function"
                      type: "object"
                  description: "How the model should use the provided tools. Can be a string shorthand or a specific function selector."
                tools:
                  description: "Tools available to the model."
                  items:
                    anyOf:
                      - description: "A function tool the model can call."
                        properties:
                          description:
                            description: "A description of what the function does."
                            type: "string"
                          name:
                            description: "The name of the function."
                            type: "string"
                          parameters:
                            description: "The parameters the function accepts, as a JSON Schema object."
                            type: "object"
                          strict:
                            description: "Whether to enforce strict parameter validation."
                            type: "boolean"
                          type:
                            enum:
                              - "function"
                            type: "string"
                        required:
                          - "type"
                          - "name"
                        title: "Function"
                        type: "object"
                      - description: "An orq.ai platform tool reference. For MCP tools, prefer type 'mcp' with 'key' instead of 'orq:mcp' with 'tool_id'."
                        properties:
                          tool_id:
                            description: "The tool ID (for orq:mcp, orq:http, orq:function)."
                            type: "string"
                          type:
                            description: "The orq.ai tool type."
                            enum:
                              - "orq:current_date"
                              - "orq:google_search"
                              - "orq:web_scraper"
                              - "orq:mcp"
                              - "orq:http"
                              - "orq:function"
                            type: "string"
                        required:
                          - "type"
                        title: "orq.ai Tool"
                        type: "object"
                      - description: "An MCP (Model Context Protocol) server tool. Provide server_url for inline mode, or key to reference a pre-configured MCP server."
                        properties:
                          allowed_tools:
                            description: "Filter which tools from the MCP server are exposed."
