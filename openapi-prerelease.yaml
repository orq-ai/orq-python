                        type: "string"
                        description: "Only supported on `image` models."
                      quality:
                        type: "string"
                        description: "Only supported on `image` models."
                      style:
                        type: "string"
                        description: "Only supported on `image` models."
                      responseFormat:
                        anyOf:
                          - type: "object"
                            properties:
                              type:
                                type: "string"
                                enum:
                                  - "json_schema"
                              display_name:
                                type: "string"
                              json_schema:
                                type: "object"
                                properties:
                                  name:
                                    type: "string"
                                  description:
                                    type: "string"
                                  strict:
                                    type: "boolean"
                                  schema:
                                    type: "object"
                                    additionalProperties: {}
                                required:
                                  - "name"
                                  - "schema"
                            required:
                              - "type"
                              - "json_schema"
                          - type: "object"
                            properties:
                              type:
                                type: "string"
                                enum:
                                  - "json_object"
                            required:
                              - "type"
                          - type: "object"
                            properties:
                              type:
                                type: "string"
                                enum:
                                  - "text"
                            required:
                              - "type"
                          - type: "string"
                            enum:
                              - "mp3"
                              - "opus"
                              - "aac"
                              - "flac"
                              - "wav"
                              - "pcm"
                          - type: "string"
                            enum:
                              - "url"
                              - "base64_json"
                          - type: "string"
                            enum:
                              - "json"
                              - "text"
                              - "srt"
                              - "verbose_json"
                              - "vtt"
