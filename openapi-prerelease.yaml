                            type: "string"
                          type:
                            enum:
                              - "mcp"
                            type: "string"
                        required:
                          - "type"
                        title: "MCP Tool"
                        type: "object"
                    description: "A tool definition. The \"type\" field determines the tool kind."
                  type: "array"
                top_logprobs:
                  description: "Number of most likely tokens to return at each position."
                  format: "int64"
                  type: "integer"
                top_p:
                  description: "Nucleus sampling parameter."
                  format: "double"
                  type: "number"
                variables:
