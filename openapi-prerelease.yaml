      x-cli-name: "create"
      x-speakeasy-max-method-params: 16
      operationId: "CreateAgentRequest"
      summary: "Create agent"
      description: "Creates a new agent with the specified configuration, including model selection, instructions, tools, and knowledge bases. Agents are intelligent assistants that can execute tasks, interact with tools, and maintain context through memory stores. The agent can be configured with a primary model and optional fallback models for automatic failover, custom instructions for behavior control, and various settings to control execution limits and tool usage."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              properties:
                key:
                  type: "string"
                  minLength: 1
                  maxLength: 255
                  pattern: "^[A-Za-z][A-Za-z0-9]*([._-][A-Za-z0-9]+)*$"
                  description: "Unique identifier for the agent within the workspace"
                display_name:
                  type: "string"
                  maxLength: 255
                  description: "agent display name within the workspace"
                role:
                  type: "string"
                  minLength: 1
                  description: "The role or function of the agent"
                description:
                  type: "string"
                  minLength: 1
                  description: "A brief description of what the agent does"
                instructions:
                  type: "string"
                  description: "Detailed instructions that guide the agent's behavior"
                system_prompt:
                  type:
                    - "string"
                    - "null"
                  minLength: 1
                  description: "A custom system prompt template for the agent. If omitted, the default template is used."
                path:
                  type: "string"
                  description: "The path where the agent will be stored in the project structure. The first element identifies the project, followed by nested folders (auto-created as needed).\n\nWith project-based API keys, the first element is treated as a folder name, as the project is predetermined by the API key."
                  example: "Default"
                model:
                  anyOf:
                    - type: "string"
                      description: "\n\nA model ID string (e.g., `openai/gpt-4o` or `anthropic/claude-haiku-4-5-20251001`). The agent can be run with a wide range of models with different capabilities, performance characteristics, and price points. Only models that support tool calling (function_calling) can be used to run agents. See (supported models)[/docs/proxy/supported-models] documentation for the complete list of available models."
                    - type: "object"
                      properties:
                        id:
                          type: "string"
                          description: "A model ID string (e.g., `openai/gpt-4o` or `anthropic/claude-haiku-4-5-20251001`). Only models that support tool calling can be used with agents."
                        parameters:
                          type: "object"
                          properties:
                            name:
                              type: "string"
                              description: "The name to display on the trace. If not specified, the default system name will be used."
                            frequency_penalty:
                              type:
                                - "number"
                                - "null"
                              description: "Number between -2.0 and 2.0. Positive values penalize new tokens based on their existing frequency in the text so far, decreasing the model's likelihood to repeat the same line verbatim."
                            max_tokens:
                              type:
                                - "integer"
                                - "null"
                              description: "`[Deprecated]`. The maximum number of tokens that can be generated in the chat completion. This value can be used to control costs for text generated via API. \n\n This value is now `deprecated` in favor of `max_completion_tokens`, and is not compatible with o1 series models."
                            max_completion_tokens:
                              type:
                                - "integer"
                                - "null"
                              exclusiveMinimum: 0
                              description: "An upper bound for the number of tokens that can be generated for a completion, including visible output tokens and reasoning tokens"
                            presence_penalty:
                              type:
                                - "number"
                                - "null"
                              description: "Number between -2.0 and 2.0. Positive values penalize new tokens based on whether they appear in the text so far, increasing the model's likelihood to talk about new topics."
                            response_format:
                              oneOf:
                                - type: "object"
                                  properties:
                                    type:
                                      type: "string"
                                      enum:
                                        - "text"
                                  required:
                                    - "type"
                                  title: "Text"
                                  description: "\n\nDefault response format. Used to generate text responses"
                                - type: "object"
                                  properties:
                                    type:
                                      type: "string"
                                      enum:
                                        - "json_object"
                                  required:
                                    - "type"
                                  title: "JSON object"
                                  description: "\n\nJSON object response format. An older method of generating JSON responses. Using `json_schema` is recommended for models that support it. Note that the model will not generate JSON without a system or user message instructing it to do so."
