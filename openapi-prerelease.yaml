        metadata:
          type: "object"
          additionalProperties: {}
      required:
        - "kind"
        - "data"
      title: "Data Part"
      description: "A structured data part containing JSON-serializable key-value pairs. Used for passing structured information between agents and tools."
    FilePart:
      type: "object"
      properties:
        kind:
          type: "string"
          enum:
            - "file"
